####------Script Settings-----####

##--Available filters: all, keybinds, groups, recents, distinct, protocols, fileonly, titleonly, timeonly, keywords.
##--Filter description: 'all' to show all items. Or 'groups' to show a list filtered using items added to any group. Or 'keybinds' to show a list filtered using keybind slots. Or "recents" to show recently added items to be recorded without duplication. Or "distinct" to show recently saved entries of files in different paths. Or "fileonly" to show files saved without time. Or "timeonly" to show files with only time. Or "keywords" to show files with matching keywords specified in the configuration. Or "playing" to show a list of currently playing files.
##--Filters can also be stacked using %+%, or omitted using %-%. For example: "groups%+%keybinds" shows only groups and keybinds, "all%-%groups%-%keybinds" shows all items without groups and without keybinds.
##--You can also call defined groups using /:group%Group Name%

#--Automatically run a list when mpv is opened with no video/file loaded. 'none' means disabled. Or choose between available filters: all, keybinds, recents, distinct, protocols, fileonly, titleonly, timeonly, keywords.
auto_run_list_idle=none

#--(0/#number). Run a saved entry based on its number when mpv starts. -1 means the earliest entry. 1 is the latest entry. A number, e.g., 13 to load a specific entry. 0 means disabled
load_item_on_startup=0

#--Hide the OSC idle screen message when opening and closing the menu (may cause unexpected behavior if multiple scripts trigger osc-idle screen off). Default: yes
toggle_idlescreen=no

#--Change to 0 so that items resume from the exact position, or decrease the value to give you some preview before loading the resume point
resume_offset=-1

#--yes to display OSD messages when actions occur. Change to no to disable all osd messages generated from this script
osd_messages=yes

#--When trying to load a bookmark, if no video/file is loaded, it will jump to your last bookmarked item
bookmark_loads_last_idle=yes

#--When trying to bookmark a file only, if no video/file is loaded, it will jump to your last bookmarked item without resuming progress
bookmark_fileonly_loads_last_idle=yes

#--yes to mark bookmark times as chapters. no disables marking as chapters
mark_bookmark_as_chapter=yes

#--Key binding to save video and progress records to the bookmark log file
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
bookmark_save_keybind=[""]

#--Key binding to save only video records to the bookmark log file
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
bookmark_fileonly_keybind=[""]

#--Key binding to open the list along with a specified filter. Available filters: "all", "keybinds", "recents", "distinct", "protocols", "fileonly", "titleonly", "timeonly", "keywords". You can also call defined groups using /:group%Group Name%
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
open_list_keybind=[ ["", "recents"], ["", "keybinds"] ]

#--Dynamic key bindings, used while the list is open to jump to specific filters (it also allows pressing the filter key binding twice to close the list). Available filters: "all", "keybinds", "recents", "distinct", "protocols", "fileonly", "titleonly", "timeonly", "keywords".
list_filter_jump_keybind=[ ["a", "all"], ["k", "keybinds"], ["r", "recents"], ["d", "distinct"], ["f", "fileonly"], ["p", "protocols"], ["t", "titleonly"], ["l", "playing"], ["!", "/:group%TV Series%"], ["@", "/:group%Movies%"], ["SHARP", "/:group%Anime%"], ["$", "/:group%Anime Movies%"], ["%", "/:group%Anime Specials%"], ["r", "recents"], ["R", "recents"], ["d", "distinct"], ["D", "distinct"], ["f", "fileonly"], ["F", "fileonly"] ]

####------Keybind Slots Settings-------####

#--When quickly saving a bookmark to a keybind slot, the position will not be saved
keybinds_quicksave_fileonly=yes

#--If the keybind slot is empty, this will enable quick bookmarks and addition to slots, otherwise assign keybinds from the bookmark list or via quick save
keybinds_empty_auto_create=no

#--When automatically creating a keybind slot, the position will not be saved
keybinds_empty_fileonly=yes

#--When loading a keybind slot, it will automatically resume to the bookmark time
keybinds_auto_resume=yes

#--Key binding to bind list items to keys as well as load keys. For example: Press Alt+1 on a list cursor position to add it, press Alt+1 while the list is hidden to load the key bound to the item in alt+1. (The system will automatically create a new slot for each key binding, e.g.: ..'Alt+9, Alt+0'. Where alt+0 creates a new 10th slot
##! Note: This binding will override the same key in input.conf
keybinds_add_load_keybind=[""]

#--To save key bindings to slots without opening the list, to load these key bindings, it uses keybinds_add_load_keybind
##! Note: This binding will override the same key in input.conf
keybinds_quicksave_keybind=[""]

#--Key binding used when the list is open to delete a keybind slot based on the cursor position
keybinds_remove_keybind=["alt+-"]

#--Key binding used when the list is open to delete a keybind slot based on the highlighted item
keybinds_remove_highlighted_keybind=["alt+_"]

####------Group Settings-------####

#--Define groups that can be assigned to bookmark items, you can also optionally assign key bindings to put bookmark items into the relevant group when the list is open. Alternatively, you can use list_group_add_cycle_keybind to assign items to groups
groups_list_and_keybind=[ ["TV Series", "ctrl+1", "ctrl+!"], ["Movies", "ctrl+2", "ctrl+@"], ["Anime", "ctrl+3", "ctrl+#"], ["Anime Movies", "ctrl+4", "ctrl+$"], ["Anime Specials", "ctrl+5"] ]

#--Key binding used when the list is open to delete a group based on the cursor position
list_groups_remove_keybind=["ctrl+-"]

#--Key binding used when the list is open to delete a group based on the highlighted item
list_groups_remove_highlighted_keybind=["ctrl+_"]

#--Key binding to add an item to a group. When the list is open, this will cycle through all the different available groups
list_group_add_cycle_keybind=["ctrl+g"]

#--Key binding to add the highlighted item to a group. When the list is open, this will cycle through all the different available groups
list_group_add_cycle_highlighted_keybind=["ctrl+G"]

####------Logging Settings------####

#--Specify the save path for the bookmark log file. Change to '/:dir%script%' to place it in the same directory as the script, or change to '/:dir%mpvconf%' to place it in the mpv portable_config directory.
##Or use '/:var' to write to any variable, then use the variable '/:var%APPDATA%', you can also use a path, e.g.: '/:var%APPDATA%\mpv' or '/:var%HOME%/mpv' or specify an absolute path, e.g.: 'C:\Users\Eisa01\Desktop\'
log_path=/:dir%mpvconf%/files

#--Name + extension of the file to be used to store log data
log_file=mpvBookmark.log

#--Choose the type of media title to save among 'all', 'protocols', 'local', 'none'. This option will store the media title in the log file, which is useful for websites/protocols where the title cannot be parsed from the link alone
file_title_logging=protocols

#--Add any protocols for which you want to store their titles in the log file below (after the comma). This is only valid for (file_title_logging = "protocols" or file_title_logging = "all")
logging_protocols=["://", "magnet:"]

#--Limit the number of saved entries with the same path: -1 means unlimited, 0 will always update entries with the same path, e.g., value 3 will limit to 3, then it will start updating old values on the 4th entry
same_entry_limit=-1

#--Set whether to preserve groups/slots or any other properties when overwriting entries. Default: yes
overwrite_preserve_properties=yes

####------List Settings-------####

#--Set whether to enable cursor wrap-around scrolling
loop_through_list=yes

#--Set whether to update and display new items after reaching the middle of the list
list_middle_loader=yes

#--Whether to enable dynamic selection key bindings, entries from 0 to 9, for quick selection when the list is open (list_show_amount = 10 is the maximum for this feature to work)
quickselect_0to9_keybind=yes

#--Whether to enable exiting the list when double-clicking the main list, even if the list was accessed through other filters
main_list_keybind_twice_exits=yes

#--Cleverly set search to not typing mode (when the search box is open) without pressing the ctrl+enter key
search_not_typing_smartly=yes

#--'any' to find any typed search based on a combination of date, title, path/URL, and time. 'any-notime' finds any typed search based on a combination of date, title, and path/URL, but not time (this is to reduce unwanted results)
search_behavior=any

####------Filter Settings-------####

#--Jump to the following filters in the order displayed when navigating with the left and right keys. You can change the order and remove unwanted filters
filters_and_sequence=["all", "keybinds", "groups", "/:group%TV Series%", "/:group%Movies%", "/:group%Anime%", "/:group%Anime Movies%", "/:group%Anime Specials%", "protocols", "fileonly", "titleonly", "timeonly", "playing", "keywords", "recents", "distinct", "keybinds%+%groups", "all%-%groups%-%keybinds"]

#--Key binding to jump to the next available filter according to filters_and_sequence
next_filter_sequence_keybind=["RIGHT", "MBTN_FORWARD"]

#--Key binding to jump to the previous available filter according to filters_and_sequence
previous_filter_sequence_keybind=["LEFT", "MBTN_BACK"]

#--Whether to enable looping through filters
loop_through_filters=yes

#--Create a filter for your desired "keywords", e.g., youtube.com will filter out videos on YouTube. You can also insert a part of a filename or title, or an extension or full path/part of a path. For example: ["youtube.com", "mp4", "naruto", "c:\\users\\eisa01\\desktop"]. Leave empty to disable the keywords filter
keywords_filter_list=[]

####------Sorting Settings-------####
##--Available sorts: added-asc to show the most recently added items first. Or added-desc to show the order of addition. Or alphanum-asc for A to Z method, with filenames and episode numbers decreasing first. Or alphanum-desc is its Z to A method. Or time-asc, time-desc to sort the list by time

#--Specify the default sort method for all different filters in the list. Options: added-asc, added-desc, time-asc, time-desc, alphanum-asc, alphanum-desc
list_default_sort=added-asc

#--Specify default sorts for specific filters, e.g.: [ ["all", "alphanum-asc"], ["playing", "added-desc"] ]
list_filters_sort=[ ["keybinds", "keybind-asc"], ["fileonly", "alphanum-asc"], ["playing", "time-asc"] ]

#--Key binding to cycle through the different available sorts when the list is open
list_cycle_sort_keybind=["alt+s"]

####------List Design Settings------####

#--Specify the alignment of the list using numeric keypad positions from 1-9, or 0 to disable. For example: 7 top-left, 8 top-center, 9 top-right
list_alignment=7

#--Set whether to slice long filenames according to the number of characters specified below
slice_name=yes

#--Number of characters to use for slicing long filenames
slice_name_amount=80

#--Change the maximum number to display more items in the current list
list_show_amount=10

#--Set the format of items when the list is opened
#--Available variables: %quickselect%, %number%, %name%, %title%, %path%, %duration%, %length%, %remaining%, %dt%, %dt_"format%"%
#--Variable description: %quickselect%: key binding for quick selection. %number%: sequential number of the item position. %name%: displays the filename. %title%: displays the file title. %path%: displays the file path or URL. %duration%: playback time reached for the item. %length%: total time length of the item. %remaining%: remaining playback time of the item. %dt%: date and time of the record.
#--You can also use %dt_"format%"% based on the lua date format (https://www.lua.org/pil/22.1.html). It is specified after dt_ . Example: (%dt_%a% %dt_%b% %dt_%y%) means abbreviated day month year
list_content_text=%number%. %name%%0_duration%%duration%%0_keybind%%keybind%%0_group%%group%%1_group%\h\N\N

#--User-defined variables that are only displayed when the relevant variable is triggered
#--#_group, #_keybind, #_duration, #_length, #_remaining, #_dt. (# User-defined variables that are only displayed when the relevant variable is triggered: "0_keybind", "1_keybind")
list_content_variables=[ ["0_duration", " 🕒 "], ["0_keybind", " ⌨ "], ["0_group", " 🖿 "] ]

#--Specify the style of the text indicating there are more items above. \N for newline. \h for space
list_sliced_prefix=...\h\N

#--Specify the style of the text indicating there are more items below
list_sliced_suffix=...

#--Specify the text color of the list, BGR hexadecimal
text_color=ffffff

#--Font size of the list text
text_scale=80

#--Black border size of the list text
text_border=0.5

#--Text color at the previous cursor position, BGR hexadecimal
text_cursor_color=ffbf7f

#--Font size of the text at the current cursor position in the list
text_cursor_scale=90

#--Black border size of the text at the current cursor position in the list
text_cursor_border=0.7

#--Prefix text for highlighted multi-selected items
text_highlight_pre_text=✅ 

#--Color of the search box when in typing mode
search_color_typing=00bfff

#--Color of the search box when in typing mode and active
search_color_not_typing=ffffaa

#--List title color, BGR hexadecimal
header_color=ffffaa

#--Title text size of the list
header_scale=100

#--Black border size of the list title
header_border=0.6

#--Text to be displayed as the list title
#--Available header variables: %cursor%, %total%, %highlight%, %filter%, %search%, %duration%, %length%, %remaining%.
#--Variable description: %cursor%: displays the cursor position number in the list. %total%: total number of items in the current list. %highlight%: total number of highlighted items. %filter%: displays the filter name. %search%: displays the typed search. %duration%: total playback time of all displayed items. %length%: total time length of the files of all displayed items. %remaining%: remaining playback time of the files of all displayed items
header_text=🔖 Bookmark Menu [%cursor%/%total%]%0_highlight%%highlight%%0_filter%%filter%%1_filter%%0_sort%%sort%%1_sort%%0_search%%search%%1_search%\h\N\N

#--User-defined variables that are only displayed when the relevant variable is triggered
#--#_filter, #_sort, #_highlight, #_search, #_duration, #_length%, #_remaining. (# indicates the possibility of creating many variables with different numbers, e.g.: "0_filter", "1_filter")
header_variables=[ ["0_highlight", "✅"], ["0_filter", " [Filter: "], ["1_filter", "]"], ["0_sort", " \\{"], ["1_sort", "}"], ["0_search", "\\h\\N\\N[Search="], ["1_search", "..]"] ]

#--Specify the sort method to hide from the header when using the %sort% variable
header_sort_hide_text=added-asc


####-----Time Format Settings-----####
##--In the first parameter, you can define from available styles: default, hms, hms-full, timestamp, timestamp-concise. "default" displays in HH:MM:SS.sss format. "hms" displays in 1h 2m 3.4s format. "hms-full" is the same as hms but remains constant when hours and minutes are 0. "timestamp" displays total time as a timestamp in 123456.700 format. "timestamp-concise" displays total time in 123456.7 format (showing and hiding decimals based on availability).
##--In the second parameter, you can define whether to display milliseconds, round milliseconds, or truncate milliseconds. Available options: 'truncate' to remove milliseconds and keep seconds. 0 removes milliseconds and rounds seconds. 1 or greater is the number of milliseconds to display. The default is 3 milliseconds.
##--In the third parameter, you can define separators between hour:minute:second. The "default" style is automatically set to ":", "hms", "hms-full" is automatically set to " ". You can define your own. Some examples: ["default", 3, "-"], ["hms-full", 5, "."], ["hms", "truncate", ":"], ["timestamp-concise"], ["timestamp", ["timestamp",0], ["timestamp", "truncate"], ["timestamp",5]

osd_time_format=["default", "truncate"]
list_duration_time_format=["default", "truncate"]
list_length_time_format=["default", "truncate"]
list_remaining_time_format=["default", "truncate"]
header_duration_time_format=["hms", "truncate", ":"]
header_length_time_format=["hms", "truncate", ":"]
header_remaining_time_format=["hms", "truncate", ":"]

####------List Key Binding Settings------####
#--Add any additional key bindings to be bound below (after the comma). Or change the letters within the quotes to change the key bindings
#--Examples of changing and adding key bindings: --from ["b", "B"] to ["b"]. --from [""] to ["alt+b"]. --from [""] to ["a" "ctrl+a", "alt+a"]

#--Key binding to navigate up in the list
list_move_up_keybind=["UP", "WHEEL_UP"]

#--Key binding to navigate down in the list
list_move_down_keybind=["DOWN", "WHEEL_DOWN"]

#--Key binding to go to the first item on the displayed page of the list
list_page_up_keybind=["PGUP"]

#--Key binding to go to the last item on the displayed page of the list
list_page_down_keybind=["PGDWN"]

#--Key binding to navigate to the first item in the list
list_move_first_keybind=["HOME"]

#--Key binding to navigate to the last item in the list
list_move_last_keybind=["END"]

#--Key binding to highlight when pressing the navigation key binding, holding shift, and then pressing any navigation key binding, e.g.: up, down, home, pgdwn, etc.
list_highlight_move_keybind=["SHIFT"]

#--Key binding to highlight all displayed items in the list
list_highlight_all_keybind=["ctrl+a"]

#--Key binding to unhighlight all currently highlighted items in the list
list_unhighlight_all_keybind=["ctrl+d"]

#--Key binding to load an entry based on the cursor position
list_select_keybind=["ENTER", "MBTN_MID"]

#--Key binding to add an entry to the playlist based on the cursor position
list_add_playlist_keybind=["CTRL+ENTER"]

#--Key binding to add all highlighted entries to the playlist
list_add_playlist_highlighted_keybind=["SHIFT+ENTER"]

#--Key binding to close the list (if search is open, it will close the search first)
list_close_keybind=["ESC", "MBTN_RIGHT"]

#--Key binding to delete an entry based on the cursor position
list_delete_keybind=["DEL"]

#--Key binding to delete all highlighted entries from the list
list_delete_highlighted_keybind=["SHIFT+DEL"]

#--Key binding to activate the search
list_search_activate_keybind=["ctrl+f"]

#--Key binding to exit typing mode while keeping the search open
list_search_not_typing_mode_keybind=["ALT+ENTER"]

#--Key bindings to ignore when the list is open
list_ignored_keybind=[""]