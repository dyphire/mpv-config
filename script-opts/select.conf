### This configuration does not support comments after parameters; they must be on a separate line

# Specify the date format for history entries. This is passed to Lua's os.date
# This uses the same format as strftime(3)
history_date_format=%Y-%m-%d %H:%M:%S
# Whether to show only the last history entry with the same path, default: yes
hide_history_duplicates=yes
# Specify the path to the built-in menu configuration file. Default: ~~/menu.conf
menu_conf_path=~~/menu.conf
# Maximum number of playlist items to display in the menu. Default: 25
#max_playlist_items=25
# Whether to observe properties referenced in `menu.conf` and update `menu-data`, default: yes
populate_menu_data=no