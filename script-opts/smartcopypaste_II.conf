####------Script Settings-----####

#--auto for automatic device detection, or manually change to: Windows or Mac or Linux
device=auto

#--Set the copy command to use in Linux. Or specify a different command
linux_copy=xclip -silent -selection clipboard -in

#--Set the paste command to use in Linux. Or specify a different command
linux_paste=xclip -selection clipboard -o

#--Set the copy command to use in Mac. Or specify a different command
mac_copy=pbcopy

#--Set the paste command to use in Mac. Or specify a different command
mac_paste=pbpaste

#--Specify Powershell to use for copying in Windows. Or specify a copy command, e.g.: clip
windows_copy=powershell

#--Specify Powershell to use for pasting in Windows. Or specify a paste command
windows_paste=powershell

#--Automatically run a list when mpv is opened with no video/file loaded. 'none' means disabled. Or choose: all, copy, paste, recents, distinct, protocols, fileonly, titleonly, timeonly, keywords.
auto_run_list_idle=none

#--Hide the OSC idle screen message when opening and closing the menu (may cause unexpected behavior if multiple scripts trigger osc-idle screen off)
toggle_idlescreen=no

#--Change to 0 so that items resume from the exact position, or decrease the value to give you some preview before loading the resume point
resume_offset=-1

#--yes to display OSD messages when actions occur. Change to no to disable all osd messages generated from this script
osd_messages=yes

#--yes to mark clipboard times as chapters. no disables marking as chapters
mark_clipboard_as_chapter=no

#--Set the option for copying time when using video. Choose: local, protocols, specifics, all, none.
## 'none' disables, 'all' copies time for all videos, 'protocols' copies time only for protocol videos, 'specifics' copies time only for videos from websites defined below, 'local' copies time only for non-protocol videos
copy_time_method=all

#--Specify the paste behavior when copying any valid content and no video is running. Options: force, force-noresume
log_paste_idle_behavior=force-noresume

#--Specify the paste behavior when copying any valid content and a video is running. Options: timestamp>playlist, timestamp>force, timestamp, playlist, force, force-noresume
log_paste_running_behavior=timestamp>playlist

#--Time attributes that will be added when copying from specific websites in this list. Additional attributes can be added in the same format
specific_time_attributes=[ ["twitter", "?t=", ""], ["twitch", "?t=", "s"], ["youtube", "&t=", "s"] ]

#--Specify the text to be copied before the jump time when copying a protocol video from mpv
protocols_time_attribute=&t=

#--Specify the text to be copied before the jump time when copying a local video from mpv
local_time_attribute=&time=

#--Automatically add pasteable time attributes for resume, specific_time_attributes, protocols_time_attribute, local_time_attribute
pastable_time_attributes=[" | time="]

#--Specify the key binding to use for copying
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
copy_keybind=[""]

#--Priority of paste behavior when a video is running. Options: playlist, timestamp, force.
running_paste_behavior=playlist

#--Specify the key binding to use for pasting
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
paste_keybind=[""]

#---Paste behavior when using paste_specific_keybind. Options: title, path, timestamp, path&timestamp.
copy_specific_behavior=path

#--Key binding to use for copying based on the specified copy behavior
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
copy_specific_keybind=[""]

#--Paste behavior when using paste_specific_keybind. Options: playlist, timestamp, force.
paste_specific_behavior=playlist

#--Key binding to use for pasting based on the specified paste behavior
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
paste_specific_keybind=[""]

#--Add any protocols you wish to paste below (after the comma); e.g., ,'ftp://'. Or set it to "" by removing all defined protocols to make pasting work for any protocol
paste_protocols=["://", "magnet:"]

#--Add any extensions you wish to paste below (after the comma); e.g., ,'pdf'. Or set it to "" by removing all defined extensions to make pasting work for any extension
