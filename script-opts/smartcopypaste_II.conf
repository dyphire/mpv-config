#--Add any extensions you wish to paste to try to add as subtitle files below (after the comma); e.g., 'txt'. Or set it to "" by removing all defined extensions to make pasting try to add any subtitles
paste_subtitles=["aqt", "gsub", "jss", "sub", "ttxt", "pjs", "psb", "rt", "smi", "slt", "ssf", "srt", "ssa", "ass", "usf", "idx", "vtt"]

#--Key binding to open the list along with a specified filter. Available filters: "all", "copy", "paste", "recents", "distinct", "protocols", "fileonly", "titleonly", "timeonly", "keywords".
##! Note: This binding will override the same key in input.conf. It is recommended to leave it empty and bind this function in input.conf
open_list_keybind=[ ["", "copy"], ["", "recents"] ]

#--Dynamic key bindings, used while the list is open to jump to specific filters (it also allows pressing the filter key binding twice to close the list). Available filters: "all", "copy", "paste", "recents", "distinct", "protocols", "fileonly", "titleonly", "timeonly", "keywords".
list_filter_jump_keybind=[ ["c", "copy"], ["v", "paste"], ["r", "recents"], ["d", "distinct"], ["f", "fileonly"], ["p", "protocols"], ["t", "titleonly"], ["l", "playing"] ]

####------Logging Settings------####

#--Specify the save path for the bookmark log file. Change to '/:dir%script%' to place it in the same directory as the script, or change to '/:dir%mpvconf%' to place it in the mpv portable_config directory.
##Or use '/:var' to write to any variable, then use the variable '/:var%APPDATA%', you can also use a path, e.g.: '/:var%APPDATA%\mpv' or '/:var%HOME%/mpv' or specify an absolute path, e.g.: 'C:\Users\Eisa01\Desktop\'
log_path=/:dir%mpvconf%/files

#--Name + extension of the file to be used to store log data
log_file=mpvClipboard.log

#--Date format in the log (see lua date format), e.g.: "%d/%m/%y %X" or "%d/%b/%y %X"
date_format=%A/%B %d/%m/%Y %X

#--Choose the type of media title to save among all, protocols, none. This option will store the media title in the log file, which is useful for websites/protocols where the title cannot be parsed from the link alone
file_title_logging=protocols

#--Add any protocols for which you want to store their titles in the log file below (after the comma). This is only valid for (file_title_logging = "protocols" or file_title_logging = "all")
logging_protocols=["://", "magnet:"]

#--Specify the scope for displaying filenames instead of titles. Choose between local, protocols, all, and none
## "local" prefers filenames for non-protocol videos. "protocols" will prefer filenames only for protocols. "all" will always use filenames instead of titles. "none" will always use titles instead of filenames
prefer_filename_over_title=local

#--Limit the number of saved entries with the same path: -1 means unlimited, 0 will always update entries with the same path, e.g., value 3 will limit to 3, then it will start updating old values on the 4th entry
same_entry_limit=4

####------List Settings-------####

#--Set whether to enable cursor wrap-around scrolling
loop_through_list=yes

#--Set whether to update and display new items after reaching the middle of the list
list_middle_loader=yes

#--Show file paths instead of media titles
show_paths=no

#--Show the number of each item before displaying its name and value
show_item_number=yes

#--Set whether to slice long filenames according to the number of characters specified below
slice_longfilenames=yes

#--Number of characters to use for slicing long filenames
slice_longfilenames_amount=80

#--Change the maximum number to display more items in the current list
list_show_amount=10

#--Whether to enable dynamic selection key bindings, entries from 0 to 9, for quick selection when the list is open (list_show_amount = 10 is the maximum for this feature to work)
quickselect_0to9_keybind=yes

#--Whether to enable exiting the list when double-clicking the main list, even if the list was accessed through other filters
main_list_keybind_twice_exits=yes

#--Cleverly set search to not typing mode (when the search box is open) without pressing the ctrl+enter key
search_not_typing_smartly=yes

#--"specific" finds matches for date, title, path/URL, time. "any" finds any typed search based on a combination of date, title, path/URL, and time. "any-notime" finds any typed search based on a combination of date, title, and path/URL, but not time (this is to reduce unwanted results)
search_behavior=any

####------Filter Settings-------####
##--Available filters: "all" to show all items. Or "keybinds" to show a list filtered using keybind slots. Or "recents" to show recently added items to be recorded without duplication. Or "distinct" to show recently saved entries of files in different paths.
##Or "fileonly" to show files saved without time. Or "timeonly" to show files with only time. Or "keywords" to show files with matching keywords specified in the configuration. Or "playing" to show a list of currently playing files.

#--Jump to the following filters in the order displayed when navigating with the left and right keys. You can change the order and remove unwanted filters
filters_and_sequence=["all", "copy", "paste", "recents", "distinct", "protocols", "playing", "fileonly", "titleonly", "keywords"]

#--Key binding to jump to the next available filter according to filters_and_sequence
next_filter_sequence_keybind=["RIGHT", "MBTN_FORWARD"]

#--Key binding to jump to the previous available filter according to filters_and_sequence
previous_filter_sequence_keybind=["LEFT", "MBTN_BACK"]

#--Whether to enable looping through filters
loop_through_filters=yes

#--Create a filter for your desired "keywords", e.g., youtube.com will filter out videos on YouTube. You can also insert a part of a filename or title, or an extension or full path/part of a path. For example: ["youtube.com", "mp4", "naruto", "c:\\users\\eisa01\\desktop"]. Leave empty to disable the keywords filter
keywords_filter_list=[""]

####------Sorting Settings-------####
##--Available sorts: added-asc to show the most recently added items first. Or added-desc to show the order of addition. Or alphanum-asc for A to Z method, with filenames and episode numbers decreasing first. Or alphanum-desc is its Z to A method. Or time-asc, time-desc to sort the list by time

#--Specify the default sort method for all different filters in the list. Options: added-asc, added-desc, time-asc, time-desc, alphanum-asc, alphanum-desc
list_default_sort=added-asc

#--Specify default sorts for specific filters, e.g.: [ ["all", "alphanum-asc"], ["playing", "added-desc"] ]
list_filters_sort=[ ["keybinds", "keybind-asc"], ["fileonly", "alphanum-asc"], ["playing", "time-asc"] ]

#--Key binding to cycle through the different available sorts when the list is open
list_cycle_sort_keybind=["alt+s"]

####------List Design Settings------####

#--Specify the alignment of the list using numeric keypad positions from 1-9, or 0 to disable. For example: 7 top-left, 8 top-center, 9 top-right
list_alignment=7

#--Type of time displayed for items in the list. Choose: duration, length, remaining.
text_time_type=duration

#--Specify the time separator style to display before the saved time
time_seperator= 🕒 

#--Specify the style of the text indicating there are more items above. \N for newline. \h for space
list_sliced_prefix=...\h\N

#--Specify the style of the text indicating there are more items below
list_sliced_suffix=...

#--yes enables pre-text to display quick select key bindings before the list. no disables
quickselect_0to9_pre_text=no

#--Specify the text color of the list, BGR hexadecimal
text_color=ffffff

#--Font size of the list text
text_scale=80

#--Black border size of the list text
text_border=0.5

#--Text color at the previous cursor position, BGR hexadecimal
text_cursor_color=ffbf7f

#--Font size of the text at the current cursor position in the list
text_cursor_scale=90

#--Black border size of the text at the current cursor position in the list
text_cursor_border=0.7

#--Prefix text for highlighted multi-selected items
text_highlight_pre_text=✅ 

#--Color of the search box when in typing mode
search_color_typing=ffffaa

#--Color of the search box when in typing mode and active
search_color_not_typing=56ffaa

#--List title color, BGR hexadecimal
header_color=56ffaa

#--Title text size of the list
header_scale=100

#--Black border size of the list title
header_border=0.6

#--Text to be displayed as the list title
#--Available header variables: %cursor%, %total%, %highlight%, %filter%, %search%, %listduration%, %listlength%, %listremaining%
#--User-defined text displayed only when variables are triggered: %prefilter%, %afterfilter%, %prehighlight%, %afterhighlight% %presearch%, %aftersearch%, %prelistduration%, %afterlistduration%, %prelistlength%, %afterlistlength%, %prelistremaining%, %afterlistremaining%
#--Variable description: %cursor%: displays the cursor position number in the list. %total%: total number of items in the current list. %highlight%: total number of highlighted items. %filter%: displays the filter name. %search%: displays the typed search. Example of user-defined text displayed only when user variables are triggered: %prefilter%: displays user-defined text before the filter, %afterfilter%: displays user-defined text after the filter

header_text=📋 Clipboard [%cursor%/%total%]%prehighlight%%highlight%%afterhighlight%%prefilter%%filter%%afterfilter%%presort%%sort%%aftersort%%presearch%%search%%aftersearch%

#--Specify the sort method to hide from the header when using the %sort% variable
header_sort_hide_text=added-asc

#--Set the text to display before or after variables when triggered in the header
header_sort_pre_text= \{
header_sort_after_text=}
header_filter_pre_text= [Filter: 
header_filter_after_text=]
header_search_pre_text=\h\N[Search=
header_search_after_text=..]
header_highlight_pre_text=✅
header_highlight_after_text=
header_list_duration_pre_text= 🕒 
header_list_duration_after_text=
header_list_length_pre_text= 🕒 
header_list_length_after_text=
header_list_remaining_pre_text= 🕒 
header_list_remaining_after_text=

#--Specify the style of the copy separator, which will be displayed for copied items in the list
copy_seperator= ©

#--Specify the style of the paste separator, which will be displayed for pasted items in the list
paste_seperator= ℗

####-----Time Format Settings-----####
##--In the first parameter, you can define from available styles: default, hms, hms-full, timestamp, timestamp-concise. "default" displays in HH:MM:SS.sss format. "hms" displays in 1h 2m 3.4s format. "hms-full" is the same as hms but remains constant when hours and minutes are 0. "timestamp" displays total time as a timestamp in 123456.700 format. "timestamp-concise" displays total time in 123456.7 format (showing and hiding decimals based on availability).
##--In the second parameter, you can define whether to display milliseconds, round milliseconds, or truncate milliseconds. Available options: 'truncate' to remove milliseconds and keep seconds. 0 removes milliseconds and rounds seconds. 1 or greater is the number of milliseconds to display. The default is 3 milliseconds.
##--In the third parameter, you can define separators between hour:minute:second. The "default" style is automatically set to ":", "hms", "hms-full" is automatically set to " ". You can define your own. Some examples: ["default", 3, "-"], ["hms-full", 5, "."], ["hms", "truncate", ":"], ["timestamp-concise"], ["timestamp", ["timestamp",0], ["timestamp", "truncate"], ["timestamp",5]

copy_time_format=["timestamp-concise"]
osd_time_format=["default", "truncate"]
list_time_format=["default", "truncate"]
header_duration_time_format=["hms", "truncate", ":"]
header_length_time_format=["hms", "truncate", ":"]
header_remaining_time_format=["hms", "truncate", ":"]

####------List Key Binding Settings------####
#--Add any additional key bindings to be bound below (after the comma). Or change the letters within the quotes to change the key bindings
#--Examples of changing and adding key bindings: --from ["b", "B"] to ["b"]. --from [""] to ["alt+b"]. --from [""] to ["a" "ctrl+a", "alt+a"]

#--Key binding to navigate up in the list
list_move_up_keybind=["UP", "WHEEL_UP"]

#--Key binding to navigate down in the list
list_move_down_keybind=["DOWN", "WHEEL_DOWN"]

#--Key binding to go to the first item on the displayed page of the list
list_page_up_keybind=["PGUP"]

#--Key binding to go to the last item on the displayed page of the list
list_page_down_keybind=["PGDWN"]

#--Key binding to navigate to the first item in the list
list_move_first_keybind=["HOME"]

#--Key binding to navigate to the last item in the list
list_move_last_keybind=["END"]

#--Key binding to highlight when pressing the navigation key binding, holding shift, and then pressing any navigation key binding, e.g.: up, down, home, pgdwn, etc.
list_highlight_move_keybind=["SHIFT"]

#--Key binding to highlight all displayed items in the list
list_highlight_all_keybind=["ctrl+a"]

#--Key binding to unhighlight all currently highlighted items in the list
list_unhighlight_all_keybind=["ctrl+d"]

#--Key binding to load an entry based on the cursor position
list_select_keybind=["ENTER", "MBTN_MID"]

#--Key binding to add an entry to the playlist based on the cursor position
list_add_playlist_keybind=["CTRL+ENTER"]

#--Key binding to add all highlighted entries to the playlist
list_add_playlist_highlighted_keybind=["SHIFT+ENTER"]

#--Key binding to close the list (if search is open, it will close the search first)
list_close_keybind=["ESC", "MBTN_RIGHT"]

#--Key binding to delete an entry based on the cursor position
list_delete_keybind=["DEL"]

#--Key binding to delete all highlighted entries from the list
list_delete_highlighted_keybind=["SHIFT+DEL"]

#--Key binding to activate the search
list_search_activate_keybind=["ctrl+f"]

#--Key binding to exit typing mode while keeping the search open
list_search_not_typing_mode_keybind=["ALT+ENTER"]

#--Key bindings to ignore when the list is open
list_ignored_keybind=[""]