# Specify the skip mode when a designated chapter is triggered. Available values: none|auto|manual (default)
mode=manual
## Specify the language for script OSD messages. Default: eng
language=eng
## Specify the timeout for script OSD message display, in seconds. Default: 20
timeout=20
# Specify additional chapter names to skip
categories=opening>^OP/ OP$/^[Oo]pening/[Oo]pening$/^Intro%s*Start/オープニング$/^Opening Start$/opening start$; ending>^ED/ ED$/^[Ee]nding/[Ee]nding$/エンディング$; credits>^[Cc]redits/[Cc]redits$; prologue>^[Pp]rologue/^[Ii]ntro$; preview>[Pp]review$/^[Pp]review/Preview$/予告$; PartAB>Part [AB]/Ending 1; PartC>Part C
# Specify chapters to skip
skip=opening;ending;credits;prologue;preview

# Position inference settings (automatically infer opening/ending based on chapter position)
# Whether to enable position-based chapter inference. Default: yes
enable_position_inference=yes
# Whether to enable cross-file history application for files without chapter files. Default: no
# When enabled: History will also be applied to other files in the same directory (e.g., record from S01E01 applied to S01E02)
# When disabled: History only takes effect for the recorded file itself, not across files
# Applicable scenario: Enable for batch marking across an entire season when following anime
enable_history_position_inference=yes
# The opening chapter must be within how many seconds from the start of the video. Default: 200
intro_time_window=200
# The ending chapter must be within how many seconds before the end of the video. Default: 300
outro_time_window=300

# Button style settings
# Button font size. Default: 24
button_font_size=24
# Button horizontal padding. Default: 20
button_padding_x=20
# Button vertical padding. Default: 15
button_padding_y=15
# Button distance from screen edge. Default: 60
button_margin=60
# Button border width. Default: 2
button_border=2
# Button corner radius. Default: 13
button_radius=13

# Button color settings (BGR format: BBGGRR)
# Color of the completed portion of the progress bar (normal state). Default: 2442F4 (red)
button_progress_color=2442F4
# Color of the completed portion of the progress bar (hover state). Default: 2442F4 (red)
button_progress_hover_color=2442F4
# Color of the remaining portion of the progress bar (normal state). Default: FFFFFF (white)
button_remaining_color=FFFFFF
# Color of the remaining portion of the progress bar (hover state). Default: 111111 (dark gray)
button_remaining_hover_color=111111
# Button text color (normal state). Default: 000000 (black)
button_text_color=000000
# Button text color (hover state). Default: FFFFFF (white)
button_text_hover_color=FFFFFF
# Button border color. Default: FFFFFF (white)
button_border_color=FFFFFF

# Specify the maximum noise level to trigger silence skipping, in dB
# Default: -40. -60 is very sensitive
# -10 is more tolerant of noise
silence_audio_level=-40
# Specify the duration of detected silence to trigger a skip. Default: 0.7
silence_duration=0.7
# The first detected silence_duration will be ignored within the seconds defined by this option, and it will continue skipping until the next silence_duration
# 0 disables, or specify a specific number of seconds. Default: 1
ignore_silence_duration=5
# Specify the minimum number of seconds before the configured silence_duration to accept a skip
# 0 disables, or specify a specific number of seconds. Default: 0
min_skip_duration=0
# Specify the maximum number of seconds before the configured silence_duration to accept a skip
# 0 disables, or specify a specific number of seconds. Default: 120
max_skip_duration=120
# Specify whether to mute audio when skipping; fast-forwarded audio can sound harsh. Default: no
force_mute_on_skip=yes
# Specify the file path for the chapter skip history. Supports absolute and relative paths
history_path=~~/files/chapterskip_history.json