###### Key Bindings ######
# Move menu cursor up
up_binding=UP WHEEL_UP
# Move menu cursor down
down_binding=DOWN WHEEL_DOWN
# Select menu item
select_binding=ENTER MBTN_LEFT
# Close quality menu
close_menu_binding=ESC MBTN_RIGHT CTRL+F ALT+F
###### Key Bindings ######

# Font size scales with the window; if disabled, larger font and padding sizes are needed
scale_playlist_by_window=yes

# Playlist style override within braces. \keyvalue is a field, additional \ is for escaping in lua
# example {\\fnUbuntu\\fs10\\b0\\bord1} equals: font=Ubuntu, size=10, bold=no, border=1
# Tag reference: https://aegi.vmoe.info/docs/3.0/ASS_Tags/
# Undeclared tags will use default OSD settings
# These styles will be used for the entire playlist. The implementation for more specific styles is not elegant
# It is recommended to use a monospace font to maintain style aesthetics
style_ass_tags={\\fnNoto Sans Mono CJK SC\\fs25\\bord0.5}

# Custom cursor
# ASS tags as mentioned above can also be used. For example:
# selected_and_inactive={\c&H33FFFF&}●  -   | adds color to the selected format
# When using ASS tags, you need to reset them for each line
selected_and_active={\c&H00FF00&}▶  - 
selected_and_inactive={\c&H33FFFF&}●  - 
unselected_and_active={\c&HAAAAAA&}▷ - 
unselected_and_inactive={\c&HFFFFFF&}○ - 

# Shift drawing coordinates. Necessary for mpv.net compatibility
shift_x=0
shift_y=0

# Padding from the top-left corner
text_padding_x=5
text_padding_y=10

# Dim the screen when the menu is open
curtain_opacity=0.7

# Timeout in seconds for the quality menu
menu_timeout=6

# Use youtube-dl to fetch the list of available formats (overrides quality_strings), default: yes
fetch_formats=yes

# List of ytdl format strings to choose from
quality_strings_video=[ {"4320p" : "bestvideo[height<=?4320p]"}, {"2160p" : "bestvideo[height<=?2160]"}, {"1440p" : "bestvideo[height<=?1440]"}, {"1080p" : "bestvideo[height<=?1080]"}, {"720p" : "bestvideo[height<=?720]"}, {"480p" : "bestvideo[height<=?480]"}, {"360p" : "bestvideo[height<=?360]"}, {"240p" : "bestvideo[height<=?240]"}, {"144p" : "bestvideo[height<=?144]"} ]
quality_strings_audio=[ {"default" : "bestaudio"} ]

# Show the video format menu after opening a network video, default: yes
start_with_menu=no

# Include unknown formats in the list. Unfortunately, selecting video or audio formats is not always perfect.
# Set to yes to ensure you don't miss any formats, but the list may then also include formats that are not actually video or audio. Known non-video/audio formats will still be filtered out.
include_unknown=no

# Hide columns where all formats are identical, default: yes
hide_identical_columns=yes

# Specify the order in which column attributes are displayed, using a ',' separated list. Prefix a column with '-' to left-align it.
# For uosc integration, text can be split into a title and a hint.
## This is achieved by separating the two columns with '|' instead of a comma.
## Available attributes are:
#resolution, width, height, fps, dynamic_range, tbr, vbr, abr, asr,
#filesize, filesize_approx, vcodec, acodec, ext, video_ext, audio_ext,
#language, format, format_note, quality
## The following attributes are handled specially:
#size, frame_rate, bitrate_total, bitrate_video, bitrate_audio,
#codec_video, codec_audio, audio_sample_rate
columns_video=-resolution,frame_rate|dynamic_range,bitrate_video,size,-codec_video,-ext
columns_audio=language,audio_sample_rate,bitrate_audio|size,-codec_audio,-ext

# Columns used for sorting. See 'columns_video' for available columns.
# Comma-separated list. Prefix a column with '-' to reverse the sort order.
# Leave this empty to preserve the order from yt-dlp/youtube-dl.
# Note: Misspelled columns will not cause an error, but they may affect the results.
sort_video=
sort_audio=