### Comments after parameters are not supported; they must be on a separate line

# -- Dynamic key bindings (corresponding to five different info pages)
#key_page_1=1
#key_page_2=2
#key_page_3=3
#key_page_4=4
#key_page_0=0

# -- Dynamic key bindings (some pages support scrolling up and down)
#key_scroll_up=UP
#key_scroll_down=DOWN
##Set the number of lines to scroll at a time. Default: 1
#scroll_lines=1

##Duration of brief display (seconds). Default: 4
#duration=4
##Data refresh interval for persistent display (seconds). Setting to 0 may cause bugs. Default: 1
#redraw_delay=1
##Text formatting (ASS). Default: yes
##ass_formatting=yes
##Prevent other OSD text from covering stats information. Default: no
#persistent_overlay=yes
##Set to yes to output full information of passes. Default: no
#print_perfdata_passes=no
##If the filter list length exceeds this number, display one filter per line. Default: 128
#filter_params_max_length=128
##Enable debug output. Default: 100
#debug=no

# -- Graph options and styles
##Display graphs of performance data. Default: no
#plot_perfdata=yes
##Display graphs of vsync and jitter values (only when statistics are persistently displayed). Default: no
#plot_vsync_ratio=yes
#plot_vsync_jitter=yes
##Display cache value graph (page 3), only shown when toggled. Default: no
#plot_cache=no
##Automatically enable tone mapping LUT visualization (only when statistics are persistently displayed). Default: no
#plot_tonemapping_lut=no

#skip_frames=5
#global_max=yes
##Clear data buffer when toggling. Default: yes
#flush_graph_data=yes
#plot_bg_border_width=1.25
#plot_bg_border_color=0000FF
#plot_bg_color=262626
#plot_color=FFFFFF

##Specify whether to scale text and graphics with the video. no attempts to keep the size unchanged, auto scales text and graphics using OSD
##while OSD uses the window or keeps a constant size, depending on the --osd-scale-by-window option. Default: auto
#vidscale=auto

# -- Font related settings
font=Noto Sans Mono CJK SC
font_mono=Noto Sans Mono CJK SC
##Font size, default 20
#font_size=20
##Font color
font_color=FFFFFF
##Font border thickness, default 1.2
border_size=1.5
##Font border color, default 262626
border_color=000000
shadow_x_offset=0.1
shadow_y_offset=0.1
shadow_color=000000
##<0-99> Font transparency, seems to be a percentage, default 11
alpha=0

# -- Custom header, used to set the text output style of ASS tags
# -- Specifying this parameter will ignore the text style values above and use this string instead
#custom_header=

# -- Text format (ASS)
#ass_nl=\\N
#ass_indent=\\h\\h\\h\\h\\h
#ass_prefix_sep=\\h\\h
#ass_b1={\\b1}
#ass_b0={\\b0}
#ass_it1={\\i1}
#ass_it0={\\i0}
# -- Without ASS
#no_ass_nl=\n
#no_ass_indent=\t
#no_ass_prefix_sep= 
#no_ass_b1=\027[1m
#no_ass_b0=\027[0m
#no_ass_it1=\027[3m
#no_ass_it0=\027[0m