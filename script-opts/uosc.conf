# The display style of the current position on the timeline. Available: line, bar
timeline_style=bar
# Timeline (line) width (windowed/fullscreen mode)
timeline_line_width=2
# Timeline size when the progress bar is fully expanded, in pixels. 0 disables it
timeline_size=30
# Top border of the background color, helps visually separate the timeline from the video
timeline_border=1
# Step size in seconds to seek when using the mouse wheel on the timeline. Default: 5
# Default uses fast seeking. Add a '!' suffix to enable exact seeking. Example: '5!'
timeline_step=5
# Whether to show render cache metrics for network content on the timeline, default: yes
timeline_cache=yes
# Provide a heatmap for YouTube videos. Available: overlay, above, no
timeline_heatmap=overlay
# Set the states in which the timeline should always be visible. Use comma separation. Available: paused, audio, image, video, idle, windowed, fullscreen
timeline_persistency=
# Set when to show the always-visible progress bar (minimized timeline). Can be: windowed (default), fullscreen, always, never
# You can also toggle it on demand using the `toggle-progress` command
progress=windowed
progress_size=2
progress_line_width=10

# Comma-separated list of items to construct the control bar above the timeline. Set to `never` to disable
# Parameter specification: Enclosed in `{}` for values, `[]` for options
# Full entry syntax: `[<[!]{disposition1}[,[!]{dispositionN}>]{element}[:{paramN}][#{badge}[>{limit}]][?{tooltip}]`
#
# Common property reference:
# `{icon}` parameter specifying the icon name (e.g., face). Query all available values at https://fonts.google.com/icons?icon.platform=web&icon.set=Material+Icons&icon.style=Rounded
# Parameters and description of `{element}`:
#   `{shorthand}` - The following available values are preconfigured shortcuts that can be used as buttons:
#      play-pause (play/pause) menu (menu) subtitles (subtitle track list) audio (audio track list) video (video track list) playlist (playlist) chapters (chapter list) editions (edition list)
#      stream-quality (stream quality preference) open-file (file browser) items (playlist/file browser)
#      next (jump to next) prev (previous) first (first) last (last) audio-device (audio output device list)
#      fullscreen (toggle fullscreen) loop-playlist (toggle playlist loop) loop-file (toggle file loop) shuffle (toggle shuffle) autoload (auto-load files)
#
#      speed[:{scale}]            (speed slider, where the scale factor of the control, default 1.3)
#      command:{icon}:{command}   (command executed when the button is pressed)
#      toggle:{icon}:{prop}       (button toggling an mpv property)
#
#      cycle:{default_icon}:{prop}:{value1}[={icon1}][!]/{valueN}[={iconN}][!]
#        A button that cycles between values of an mpv property. Each value can optionally have a different {icon} and an active flag. An optional half-width exclamation mark at the end makes the button stylable as active.
#
#      gap[:{scale}]   (leaves a gap, where the scale factor of the control, default 0.3)
#      space (fills all space between two controls, useful for right-aligning entries. Use multiple spaces to distribute space between them, can be used for centering)
#
# Visibility control of control entries:
##   `<[!]{disposition1}[+[!]{dispositionN}][,{more_dispositions}]>` - Optional prefix to control the visibility of {element}
#   - `+` creates an AND condition, `,` splits into OR groups. Example: `<foo,bar+baz>` -> `foo OR (bar AND baz)`
#   - Available values for `{disposition}`:
##      idle             true if mpv is idle
##      image            true if the current file is a single-frame image
##      audio            true if the current file is audio-only
##      video            true if the current file has a video track
##      has_many_video   true if the current file has multiple video tracks
##      has_image        true if the current file has a cover or other image track
##      has_audio        true if the current file has an audio track
##      has_many_audio   true if the current file has multiple audio tracks
##      has_sub          true if the current file has a subtitle track
##      has_many_sub     true if the current file has multiple subtitle tracks
##      has_many_edition true if the current file has multiple editions
##      has_chapter      true if the current file has chapters
##      stream           true if the current file is a stream
##      has_playlist     true if the current playlist has multiple files
##      {mpv_prop}       any mpv property (note: you can set `user-data/foo` in a script to add custom properties)
##     An optional `!` prefix can be used to invert the required handling.
## Example:
##     - `<stream>stream-quality` - only show the "stream quality preference" button for streams
##     - `<has_audio,!audio>audio` - show the "audio track list" button for all files with an audio track, but not for audio-only files
#
# Place `#{badge}[>{limit}]` after the `{element}` parameter to give it a badge. Available `badge` values:
##   `sub`, `audio`, `video` - track count value
##   `{mpv_prop}` - if the mpv property value is an array, its size will be displayed. See available properties at: https://mpv.io/manual/master/#property-list
##   `>{limit}` only display the badge if its value is above this threshold
##   Example: `#audio>1`
#
# Place `?{tooltip}` after the `{element}` settings to give it a tooltip
## Example: `<stream>stream-quality?Stream quality`
#
# Implementation demonstration of some available shortcuts:
##   menu = command:menu:script-binding uosc/menu-blurred?Menu
##   subtitles = command:subtitles:script-binding uosc/subtitles#sub>1?Subtitles
##   fullscreen = cycle:crop_free:fullscreen:no/yes=fullscreen_exit!?Fullscreen
##   loop-playlist = cycle:repeat:loop-playlist:no/inf!?Loop playlist
##   toggle:{icon}:{prop} = cycle:{icon}:{prop}:no/yes!
controls=open-file,<idle>command:history:script-binding recentmenu/open?Recently Played,<idle>command:bookmark_border:script-binding simplebookmark/open-list?Bookmarks Menu,<idle>command:content_copy:script-binding smartcopypaste_II/open-list?Clipboard Menu,gap,<!idle>command:analytics:script-binding stats/display-stats?Statistics,<stream>stream-quality,<audio,has_image+!video>command:image:script-binding uosc/video#video?Cover,<has_many_edition>editions,<video>video,<has_audio+!audio>audio,<video,audio>subtitles,<has_chapter>chapters,space,<has_chapter>command:skip_previous:add chapter -1?Previous Chapter,<video,audio>speed,<has_chapter>command:skip_next:add chapter 1?Next Chapter,space,loop-file,shuffle,loop-playlist,gap,<has_playlist>prev,<has_playlist>playlist,<has_playlist>next,gap,audio-device,gap,fullscreen
controls_size=32
controls_margin=8
controls_spacing=2
controls_persistency=idle

# Display the position of the volume control: none, left, right
# Set the style of the volume control bar
volume=right
volume_size=40
volume_border=1
volume_step=1
volume_persistency=

# Playback speed widget: drag or scroll with the mouse to change, click to reset
speed_step=0.1
speed_step_is_factor=no
speed_persistency=

# Control all menus, such as context menus, subtitle loaders/selectors, etc.
menu_item_height=36
menu_min_width=260
menu_padding=1
# Determines whether `/` or `ctrl+f` is required to activate search or whether typing any text is sufficient
# When enabled, if the menu is a unicode character, you can no longer close the menu with the same key that opens it
menu_type_to_search=no


# Display logic for the top bar (only shown in borderless and fullscreen modes), default no-border. Other available values: never, always
top_bar=no-border
top_bar_size=40
# Enable the right-side control buttons of the top bar. The example shows the default value
top_bar_controls=yes
# Can be: `no` (hide), `yes` (inherit title from mpv.conf), or a custom template string
top_bar_title=yes
# Enable an alternative top bar title using a template string. If the alternative title matches the main title, it will be hidden
# Hint: Use '${media-title}' for the main title, use '${filename}' for the alternative title
top_bar_alt_title=${?media-title:${media-title}}
# Can be:
#   `below`  => display the alternative title below the main title
#   `toggle` => toggle the top bar title text between the main title and alt by clicking the top bar, or by calling the `toggle-title` binding
top_bar_alt_title_place=below
# Flash the top bar when loading the following types of content. Available: audio, image, video, chapter. Default: video, audio. The special value none disables flashing
top_bar_flash_on=video,audio
top_bar_persistency=

# Inner border and transparency drawn in border mode
window_border_size=1

# If there is no playlist and the file ends, load the next file in the directory that matches the types specified by the load_types option, default: no
# When this option is enabled, uosc will actively set mpv option states: `keep-open=yes`; `keep-open-pause=no`
autoload=no
# Enable shuffle for playlist/directory navigation, default: no
# This is necessary to achieve shuffle that works as intended, including directory navigation, because mpv's built-in "shuffle" option is basically unusable
shuffle=no

# Specify the scaling ratio of the UI. Refer to the HIDPI scaling ratio of the monitor
scale=1
# Specify the scaling ratio of the UI when fullscreen. Default: 1.3
scale_fullscreen=1.3
# Custom font to use for the UI. Monospace fonts are recommended for better display. Leave empty to use 'osd-font'
font=Noto Sans Mono CJK SC
# Adjust text scaling to fit your font
font_scale=1
# Specify the border of text and icons when drawn directly on top of the video. Default: 1.2
text_border=1.2
# Specify the border radius of buttons, menus, and all other rectangles. Default: 4
border_radius=2
# Set a comma-separated list of color overrides in RGB hexadecimal format: `rrggbb`
# Default: foreground=ffffff,foreground_text=000000,background=000000,background_text=ffffff,curtain=111111,match=69c5ff,heatmap=00adee
color=foreground=FFFBFE,foreground_text=1C1B1F,background=1C1B1F,background_text=FFFBFE
# Set a comma-separated list of opacity overrides for various UI element backgrounds and shapes. Text is always 100%
# Example: opacity=timeline=0.5,title=0.5
# Default: timeline=0.9,position=1,chapters=0.8,slider=0.9,slider_gauge=1,controls=0,speed=0.6,menu=1,submenu=0.4,border=1,title=1,
#        tooltip=1,thumbnail=1,curtain=0.8,idle_indicator=0.8,audio_indicator=0.5,buffering_indicator=0.3,playlist_position=0.8,heatmap=0.4
opacity=menu=0.9,submenu=0.7,curtain=0.5
# A comma-separated list of features to refine at the cost of some performance impact. Default: empty
# text_width - use more accurate text width measurement, measuring each text string individually instead of measuring the width of known letters once and adding them together
# sorting    - use filename sorting to better handle non-English languages, especially Asian languages. Currently, this feature is only available on Windows and has no effect on other platforms
refine=sorting
# Specify the duration of transition animations in milliseconds. Default: 100
animation_duration=100
# Duration of the flash used by `flash-{element}` commands in milliseconds
flash_duration=1000
# Distance in pixels below which elements are completely faded in/out
proximity_in=40
proximity_out=120
# Whether to use bold font weight exclusively throughout the UI, default: no
font_bold=no
# Specify how to display the time on the right side of the timeline: `total`, `playtime-remaining` (scaled by current speed), `time-remaining` (remaining length of the file)
destination_time=playtime-remaining
# Specify the sub-second precision of displayed timestamps, equivalent to the number of decimal places for seconds. Default 0
time_precision=3
# Display the buffered time of the stream in the timeline if it is below this number of seconds. 0 disables it
buffered_time_threshold=60
# Whether to hide the UI when mpv automatically hides the cursor, default: no
autohide=no
# Specify the style of the indicator displayed when toggling the pause state
# Can be: none, flash, static, manual (controlled by the flash-pause-indicator and decide-pause-indicator commands)
pause_indicator=manual
# Specify the sizes listed in the stream quality menu
stream_quality_options=4320,2160,1440,1080,720,480,360,240,144
# Specify the file types to look for when navigating media files
video_types=3g2,3gp,asf,avi,bdmv,f4v,flv,h264,h265,iso,ifo,m2ts,m4v,mkv,mov,mp4,mp4v,mpeg,mpg,ogm,ogv,rm,rmvb,ts,vob,webm,wmv,y4m
audio_types=aac,ac3,aiff,ape,au,dsf,dts,flac,m4a,mid,midi,mka,mp3,mp4a,oga,ogg,opus,spx,tak,tta,wav,weba,wma,wv
image_types=apng,avif,bmp,gif,j2k,jp2,jfif,jpeg,jpg,jxl,mj2,png,svg,tga,tif,tiff,webp
playlist_types=m3u,m3u8,pls,url,cue
# Specify the file types to look for when loading external subtitles
subtitle_types=aqt,ass,gsub,idx,jss,lrc,mks,pgs,pjs,psb,rt,slt,smi,sub,sup,sbv,srt,ssa,ssf,ttxt,txt,usf,vt,vtt
# Which types are accepted as the next entry when automatically loading or requesting to play the next file
# Options: video, audio, image, playlist, same. The special value same means only load media files of the same type as the current file
load_types=same
# Specify the default directory when opening the file menu, default: ~/. Use the special value '{drives}' to open the drive menu on Windows (defaults to '/' on Unix)
default_directory={drives}
# Whether to list hidden files when reading a directory, default: no. Due to environmental constraints, this currently only hides files starting with a '.' dot
# Does not hide hidden files on Windows (we cannot tell they are hidden)
show_hidden_files=no
# Move files to the trash can when deleting, default: no
use_trash=yes
# OSD margins adjusted based on the visibility of UI elements, default: yes
adjust_osd_margins=no


# Convert some common chapter types into chapter range indicators. The portion of the timeline belonging to the chapter is color-coded based on this.
# Chapter range indicator syntax is comma-separated "{type}:{color}"
# `{type}` - Range type. Currently supported types are:
#  - `openings` - opening and anime opening sequences
#  - `endings` - outro and anime ending sequences
#  - `ads` - sponsor blocks created by the script: https://github.com/po5/mpv_sponsorblock
# `{color}` - Color code in RRGGBB(AA) format
#
# To not convert any range types, simply remove them from the list. Leave it empty to disable this feature entirely.
# Example: chapter_ranges=openings:38869680,endings:38869680,ads:a5353580
chapter_ranges=openings:30abf964,endings:30abf964,intros:3fb95080,outros:3fb95080,ads:c54e4e80
# Additional lua patterns to identify the start of chapter ranges (for all chapters except `ads`)
# Syntax: `{type}:{pattern}[,{patternN}][;{type}:{pattern}[,{patternN}]]`
# Currently definable chapter range `types` are: openings; endings; intros; outros
chapter_range_patterns=openings:^Intro%s*Start,オープニング$,^Opening Start$,opening start$;endings:^end$,^End$,エンディング$;intros:preview$,Preview$,予告$;outros:credits$

# Specify the priority order for localization languages, from highest to lowest
# Built-in languages can be found in 'uosc/intl'.
# 'slang' is a keyword that inherits the value from the '--slang' property
# Supports paths to custom json files: `languages=~~/custom.json,slang,en`
languages=slang,en

# By default, subtitles are downloaded to the directory of the currently opened file
# If playing a file from a URL, we will use this directory (expands to `{mpv_config_dir}/subtitles`)
# Prefix the path with `!` to force all subtitles to be saved there, example: `!~~/subtitles`
subtitles_directory=~~/subtitles

# Specify a list of element IDs to disable, separated by commas, default empty. Available IDs:
#   window_border, top_bar, timeline, controls, volume,
#   idle_indicator, audio_indicator, buffering_indicator, pause_indicator
disable_elements=idle_indicator,audio_indicator

# Specify the path to the `ziggy` executable. Default: default, i.e., `~~/scripts/uosc/bin`
# Leave empty to look for the executable in the system PATH, and on Windows also in the directory where mpv.exe is located
ziggy_path=