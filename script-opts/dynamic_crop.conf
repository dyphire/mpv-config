# [0-4] 0 disable, 1 on-demand, 2 single start, 3 auto manual, 4 auto start
mode=3
# Delay in seconds for skipping introductions (applicable for mode 2)
start_delay=0
# Seconds
prevent_change_timer=30
# [0-3], disabled when "prevent_change_timer = 0". 0 disable, 1 keep max, 2 keep min, 3 keep latest
prevent_change_mode=0
# Attempt to fix the default behavior of resizing the window to the source dimensions when crop filter changes in windowed/maximized mode by adjusting geometry
## 0-no fix (recommended), 1: fix - keep window size, 2: fix - keep window width, 3: fix - keep window height. Default: 1
fix_windowed_behavior=0
# Seconds. 0 is the minimum, i.e., 1 frame. Default: 0.2
fast_change_timer=0.2
# Seconds. 0 disables. Default: 0.5
limit_timer=0.5
# Seconds. Default: 2
ratio_timer=2
# Seconds. >= 'ratio_timer'. Default: 20, new offset for asymmetric videos
offset_timer=20
# Seconds, >= 'offset_timer', disable: 0. Default: 40, not in ratio list, possibly with new offset
fallback_timer=40
# Integer, use detect_round to scale to match source width/height
linked_tolerance=2
# List separated by spaces
ratios=2.76 2.55 24/9 2.4 2.39 2.35 2.2 2.1 2 1.9 1.85 16/9 5/3 1.5 1.43 4/3 1.25 9/16 9/18 9/21
# Even number, adjusted to more easily match the ratio list. Default: 2
ratio_tolerance=2
# [0-2], default 0 disable, 1 fast_change_timer, 2 ratio_timer
read_ahead_mode=0
# Integer/frames, increase the lead time. Default: 0
read_ahead_sync=0
# [0.0-1] %, use extra time to allow new metadata to be segmented rather than continuous. 0 will only approve continuous metadata (strict), i.e., disable this
segmentation=0.5
# Specify which method to use for cropping: 0 lavfi-crop (ffmpeg/filter), 1 video-crop (mpv/VO). Default: 1
crop_method=1
# Filter, see https://ffmpeg.org/ffmpeg-filters.html#cropdetect
## Is the maximum usage, if there is shallow black, increase slowly
detect_limit=26
# Even number
detect_round=2
# Debug
debug=no