#######################################################
# This is the default config file for mpv-file-browser
# https://github.com/CogentRedTester/mpv-file-browser
#######################################################

# root directories, separated by commas
# on linux, you may want to add "/",
# on windows, this should be used to add different drive letters
# Examples:
# linux:
#   root=~/,/
# windows:
#   root=~/,C:/
root=~/

# characters separate root directories, each character works individually
# in case someone uses directories with unusual names
root_separators=,

# number of entries to display on the screen at once
num_entries=20

# number of directories to keep in history, size 0 disables history
history_size=100

# whether the directory should wrap around, default yes
wrap=yes

# whether to enable addons, default: no
addons=yes

# enable custom key bindings
# the keybind json file must be located in ~~/script-opts
custom_keybinds=yes

# auto-detect Windows drives and add them to the root directory
# using Ctrl+r while in the root will run another scan
auto_detect_windows_drives=yes

# prefer the current working directory over the root directory when opening the browser in idle mode
# the working directory is set to "current" anyway, so the browser will automatically locate the current working directory during playback, even if this option is set to no
default_to_working_directory=no

# when opening the browser, prefer the directory opened by a previous MPV instance of the file browser
# overrides the `default_to_working_directory` option
# requires `save_last_opened_directory` to be yes
# uses the internal `last-opened-directory` addon
default_to_last_opened_directory=no

# whether to save the last opened directory
save_last_opened_directory=no

# when the playing file changes, move the cursor to the currently playing item (if present)
cursor_follows_playing_item=no

####################################
########## filter settings #########
####################################

# only display files compatible with mpv in the browser
filter_files=yes

# the file browser only displays files compatible with mpv by default
# adding file extensions to this list will add them to the extension whitelist
# separated by root separators, do not use any spaces
extension_whitelist=amv;bdmv;ifo;iso

# add file extensions to this list to disable default file types
# this will override all whitelist options above and below
#extension_blacklist=mpls

# adding file extensions to this list will add them to the external audio track extension whitelist
# separated by root separators, do not use any spaces
audio_extensions=mka,dts,dtshd,dts-hd,truehd,true-hd,flac

# adding file extensions to this list will add them to the subtitle extension whitelist
# separated by root separators, do not use any spaces
subtitle_extensions=etf,etf8,utf-8,idx,sub,srt,rt,ssa,ass,mks,vtt,sup,scc,smi,lrc,pgs

# filter directories or files starting with '.' like .config
# for linux systems
#filter_dot_dirs=no
#filter_dot_files=no

####################################
###### file loading settings #######
####################################

# this option can reverse the behavior of the alt+ENTER key binding
# when the key binding is disabled, autoloading needs to be enabled for files
# when the key binding is enabled, autoloading for files will be disabled
autoload=no

# enable recursive directory functionality when appending items to the playlist (experimental), default: no
# this feature has huge performance improvement potential when using addons with asynchronous IO
concurrent_recursion=yes

# maximum number of recursions that can run concurrently
# if this number is too high, it may overflow the mpv event queue, causing some directories to be completely discarded, default: 16
max_concurrency=16

# when appending local files to the playlist, replace backslashes with forward slashes
# may be useful on Windows systems, default: no
substitute_backslash=no

# if autoloading is triggered by selecting the currently playing file, the current file will save its watch-later configuration before closing and reopening
# when disabled, the current file will not restart
autoload_save_current=yes

####################################
### directory parsing settings #####
####################################

# directory caching is used to improve directory reading speed
# can be enabled if loading directories takes a long time.
# however, it may cause "ghost" files to appear (deleted but still present)
# or fail to display recently created files.
# the cache will not be used when reloading a directory with Ctrl+r.
# use Ctrl+Shift+r to force clear the cache.
cache=no

# enable the internal `ls` addon, which parses directories using the `ls` command.
# allows directory parsing to run in parallel, preventing browser stuttering.
# this is automatically disabled on Windows systems.
ls_parser=yes

# enable the internal `windir` addon, which parses directories using the `dir` command from cmd.exe.
# allows directory parsing to run in parallel, preventing browser stuttering.
# this is automatically disabled on non-Windows systems.
windir_parser=no

# when moving up a directory, do not stop on empty protocol schemes, such as `ftp://`
# e.g., moving up from `ftp://localhost/` will go directly to the root directory, not `ftp://`
skip_protocol_schemes=yes

# map optical disc drive paths to their respective file paths
# e.g., map bd:// to the value of the bluray-device property
map_bd_device=yes
map_dvd_device=yes
map_cdda_device=yes

####################################
########## misc settings ###########
####################################

# whether to enable script information to control the display of logo text on the idle screen
toggle_idlescreen=no

# interpret backslashes '\' in paths as forward slashes '/'
# this is useful on Windows, as Windows itself uses backslashes.
# since backslashes are valid filename characters on Unix systems, this may cause path corruption, but such filenames are rare
# use "yes" and "no" to enable/disable. "auto" attempts to use MPV's "platform" property (mpv v0.36+) to decide
# if the property is not available, defaults to "yes"
normalise_backslash=auto

# set the current open state of the browser in the `file_browser/open` field of the `user-data` property
# this property is only available in mpv v0.36+
set_user_data=yes

# set the current open state of the browser in the `file_browser-open` field of the `shared-script-properties` property
# this property is deprecated
set_shared_script_properties=no

####################################
########## file overrides  #########
####################################

# directory to load external modules
module_directory=~~/script-modules
addon_directory=~~/script-modules/file-browser-addons
custom_keybinds_file=~~/script-opts/file-browser-keybinds.json
last_opened_directory_file=~~/files/file_browser-last_opened_directory


####################################
######### style settings ###########
####################################

# replace the user's home directory with "~/" in the title, implemented using the internal label addon
home_label=yes

# set the file browser to use a specific text alignment (default: top-left)
# use ASS tag alignment numbers: https://aegi.vmoe.info/docs/3.0/ASS_Tags/#index23h3
# set to 'auto' to use the default mpv osd alignment options
# options: 'auto'|'top'|'center'|'bottom'
align_y=top
# options: 'auto'|'left'|'center'|'right'
align_x=left

# format string for the header. use custom keybind replacement codes to
# dynamically change the content of the header. see: docs/custom-keybinds.md#codes
# for example, to add file numbers set it to: {\fnMonospace}[%i/%x]{\fn<font_name_header or blank>} %q\N----------------------------------------------------
format_string_header=%q\N----------------------------------------------------

# format string for wrappers. supports custom keybind replacement codes, as well as two additional codes: '%<' and '%>', which display the number of items before and after the visible list, respectively
# setting these options to an empty string will disable wrappers
format_string_topwrapper=%< items above\N
format_string_bottomwrapper=\N%> items remaining

