# set the opacity of the font (hexadecimal), from 00 (opaque) to FF (transparent)
font_opacity_selection_marker=99

# use bold for the header
font_bold_header=yes

# specify the size to scale the browser; 2 doubles the size, 0.5 halves it, and so on.
# the header and wrappers are scaled relative to the base size
scaling_factor_base=1
scaling_factor_header=1.4
scaling_factor_wrappers=0.64

# custom font names, default is blank
# setting a custom font for folders/cursors can fix broken or missing icons
#font_name_header=
font_name_body=Noto Sans Mono CJK SC
#font_name_wrappers=
#font_name_folder=
#font_name_cursor=

# custom font colors
# colours are in hexadecimal format, ordered as blue-green-red
# this is the reverse order of most RGB color codes
font_colour_header=00ccff
font_colour_body=ffffff
font_colour_wrappers=00ccff
font_colour_cursor=00ccff
font_colour_escape_chars=413eff

# the following options are the colors for list items in different states
font_colour_selected=fce788
font_colour_multiselect=fcad88
font_colour_playing=33ff66
font_colour_playing_multiselected=22b547