### This configuration does not support comments after active parameters; if comments are needed, they should be on a separate line

#### ------- Mpv-Playlistmanager configuration ------- ####

#### ------- FUNCTIONAL ------- ####

#navigation key bindings are only forced to override when the playlist is visible
#set "no", then the playlist can be shown by any navigation key
dynamic_binds=yes

#Main menu key binding
key_showplaylist=

#Display the playlist when holding the key
key_peek_at_playlist=

## Dynamic binding keys should not be set in input.conf (do not conflict with statically bound keys)
## Multiple keys can be bound, separated by spaces
key_moveup=UP WHEEL_UP
key_movedown=DOWN WHEEL_DOWN
key_movepageup=PGUP MBTN_BACK
key_movepagedown=PGDWN MBTN_FORWARD
key_movebegin=HOME
key_moveend=END
key_selectfile=RIGHT
key_unselectfile=LEFT
key_playfile=ENTER MBTN_LEFT
key_removefile=DEL BS
key_closeplaylist=ESC MBTN_RIGHT

## Additional function key dynamic bindings
## Multiple keys can be bound, separated by spaces
key_sortplaylist=s
key_shuffleplaylist=r R
key_reverseplaylist=S
key_loadfiles=l L
key_saveplaylist=p P

# json replacement format, see .lua for instructions
# example json=[{"ext":{"all":true},"rules":[{"_":" "}]},{"ext":{"mp4":true,"mkv":true},"rules":[{"^(.+)%..+$":"%1"},{"%s*[%[%(].-[%]%)]%s*":""},{"(%w)%.(%w)":"%1 %2"}]},{"protocol":{"http":true,"https":true},"rules":[{"^%a+://w*%.?":""}]}]
# Empty value, no replacement needed
filename_replace=[{"protocol":{"all":true},"rules":[{"%%(%x%x)":"hex_to_char"}]},{"protocol":{"http":true,"https":true},"rules":[{"^%a[%a%d]+://localhost:.*/":""}]}]

## Specify the file types to search for and load from the directory. Note: This duplicates the functionality of the autoload.lua script
#loadfiles_filetypes=["3gp","amr","amv","asf","avi","avi","bdmv","f4v","flv","ifo","iso","m2ts","m4v","mkv","mov","mp4","mpeg","mpg","ogv","rm","rmvb","ts","vob","webm","wmv"]
#Load 1 or more files into the playlist on startup. Note: This duplicates the functionality of the autoload.lua script
loadfiles_on_start=no

#Load files from the working directory on idle startup
loadfiles_on_idle_start=no

#Always place loaded files after the currently playing file
loadfiles_always_append=no

#Specify whether to perform natural sorting when adding any files to the playlist after initial loading
sortplaylist_on_file_add=no

#Specify the sorting method to use when using the sort function, must be one of: "name-asc", "name-desc", "date-asc", "date-desc", "size-asc", "size-desc"
default_sort=name-asc

#linux | windows | auto
system=auto

#Use ~ for home directory. Leave empty to use mpv/playlists
playlist_savepath=

#Sync the position of the currently playing file when the playlist is opened
sync_cursor_on_load=yes

#Show the file title every time a new file is loaded
show_title_on_file_load=no
#Show the playlist every time a new file is loaded
show_playlist_on_file_load=no
#Close the playlist after selecting a file to play
close_playlist_on_playfile=no

##Whether to automatically move the cursor to the first entry when it reaches the end
loop_cursor=yes

#Reset cursor navigation when the playlist is not visible
reset_cursor_on_close=yes

#Allow the playlist manager to write watch-later configurations when navigating between files
allow_write_watch_later_config=no

#Display visual feedback on the OSD when saving, shuffling, or reversing the playlist
display_osd_feedback=no

#Prefer to display titles for: "all", "url", "none". Sorting still uses filenames
prefer_titles=url

#Specify the ytdl executable to use for title resolution, can be an absolute path. Default: yt-dlp
youtube_dl_executable=yt-dlp

#Use youtube-dl/yt-dlp to resolve titles of URLs in the playlist, default: no
#prefer_titles must be set to "url" or "all" for this to work correctly
resolve_url_titles=yes

#Specify the timeout for URL title resolution in the playlist, default: 15s
resolve_title_timeout=15

#Specify the number of URL media titles to resolve simultaneously. Higher numbers may cause noticeable stuttering
concurrent_title_resolve_limit=10

##Duration the playlist is displayed on the OSD, default: 5s
playlist_display_timeout=5

##Maximum number of rows the playlist will display. The special value -1 will calculate automatically, default: -1
showamount=13

##Font style for the playlist
#example {\fnUbuntu\fs10\b0\bord1} equals: font=Ubuntu, size=10, bold=no, border=1
#read http://docs.aegisub.org/3.2/ASS_Tags/ for reference of tags
#no values default to OSD settings in mpv.conf
style_ass_tags={\fnNoto Sans CJK SC\fs26\b1\bord0.5}

##Top-left margin
text_padding_x=10
text_padding_y=15

#Opacity of the curtain when the menu is open, range: 0.0 - 1.0 (0 is transparent (default), 1 is opaque)
curtain_opacity=0.0

##Whether to modify MPV's window title
set_title_stripped=no
title_prefix=
title_suffix= - mpv

##Whether to truncate long filenames, maximum number of characters to display
slice_longfilenames=yes
slice_longfilenames_amount=100

##Playlist header
#%mediatitle or %filename = title or name of the playing file
#%pos = position of the playing file
#%cursor = navigation position
#%plen = playlist length
#%N = newline
playlist_header=Playlist [%cursor/%plen]

##Playlist template
#%pos = position of the playing file
#%name = title or name of the file
#%N = newline
#ASS tags as mentioned above can also be used. For example:
# selected_file={\c&HFF00FF&}➔ %name   | adds color to the selected file
#When using ASS tags, you need to reset them for each line (see https://github.com/jonniek/mpv-playlistmanager/issues/20)
normal_file={\c&HFFFFFF&}□ %name
hovered_file={\c&H33FFFF&}■ %name
selected_file={\c&C1C1FF&}☑ %name
playing_file={\c&HAAAAAA&}▷ %name
playing_hovered_file={\c&H00FF00&}▶ %name
playing_selected_file={\c&C1C1FF&}☑ %name

##Display when the playlist is truncated
playlist_sliced_prefix=▲
playlist_sliced_suffix=▼