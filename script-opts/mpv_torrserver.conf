## Specify the TorrServer HTTP address, the example shows the default value
server=http://localhost:8090
## Specify whether to enable TorrServer initialization. Default: no
#! This option is only needed when TorrServer is on the same device and auto-start is not set up
torrserver_init=no
## Specify the TorrServer path, the example shows the default value. Can be a relative path (with environment variable set) or an absolute path
## TorrServer needs to be installed separately, see: https://github.com/YouROK/TorrServer
#! This option is only needed when torrserver_init=yes
torrserver_path=TorrServer
## Specify whether to search for possible external tracks (audio tracks, subtitles). Default: yes
search_for_external_tracks=yes