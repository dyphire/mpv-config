#######################################################
## Default configuration file for mpv-sub-select     ##
## https://github.com/CogentRedTester/mpv-sub-select ##
#######################################################

# Force enable the script
#! Note: This does not override the explicit specification of the sid option
force_enable=yes

# Experimental audio track selection based on preference json file
select_audio=no

# Observe audio switches and reselect subtitles when alang changes
observe_audio_switches=yes

# Select only forced subtitles explicitly indicated in subtitle tracks.
# By default, when searching for subtitle tracks of a specific language,
# forced subtitles will be included in the search results and treated the same as other tracks.
# This means there is no way to write rules that specifically exclude forced subtitle tracks.
# By enabling explicit_forced_subs, forced subtitles will never be selected unless there is a rule that explicitly includes "forced" in `slang`.
explicit_forced_subs=no

# Specify the folder containing the "sub-select.json" file
config=~~/script-opts