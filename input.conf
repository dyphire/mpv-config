REWIND           seek -30
NEXT             playlist-next
PREV             playlist-prev

SPACE            cycle pause;script-message-to uosc flash-pause-indicator

MBTN_LEFT        cycle pause;script-message-to uosc flash-pause-indicator
MBTN_LEFT_DBL    ignore
