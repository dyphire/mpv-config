# This file defines mpv's key bindings and uosc right-click menu items

##⇘⇘uosc level 1 menu: Open
o                script-message-to uosc open-file                                                                       #menu: Open > Open built-in browser
CTRL+o           script-message-to open_dialog import_files                                                             #menu: Open > Open native browser
TAB              script-message-to file_browser browse-files;script-message-to file_browser dynamic/reload;show-text '' #menu: Open > Open OSD browser
#                script-message-to uosc playlist                                                                        #menu: Open > Playlist menu
#                script-message-to uosc chapters                                                                        #menu: Open > Chapters menu
#                script-message-to uosc editions                                                                        #menu: Open > Editions menu
#                script-message-to uosc audio                                                                           #menu: Open > Other audio tracks
#                script-message-to uosc subtitles                                                                       #menu: Open > Other subtitles
#                ignore                                                                                                 #menu: Open > ---
`                script-message-to simplehistory open-list;show-text ''                                                 #menu: Open > History > Open history menu
ALT+l            script-message-to simplehistory history-incognito-mode                                                 #menu: Open > History > Toggle incognito history
CTRL+L           script-message-to simplehistory history-load-last                                                      #menu: Open > History > Load last played file
CTRL+l           script-message-to simplehistory history-resume                                                         #menu: Open > History > Load last played file with progress
N                script-message-to simplebookmark open-list;show-text ''                                                #menu: Open > Bookmarks > Open bookmarks menu
CTRL+n           script-message-to simplebookmark bookmark-save                                                         #menu: Open > Bookmarks > Add progress bookmark
CTRL+N           script-message-to simplebookmark bookmark-fileonly                                                     #menu: Open > Bookmarks > Add file bookmark
ALT+C            script-message-to smartcopypaste_II open-list;show-text ''                                             #menu: Open > Clipboard > Open clipboard menu
CTRL+c           script-message-to smartcopypaste_II copy                                                               #menu: Open > Clipboard > Copy file path and progress
CTRL+ALT+c       script-message-to smartcopypaste_II copy-specific                                                      #menu: Open > Clipboard > Copy file path
CTRL+v           script-message-to smartcopypaste_II paste                                                              #menu: Open > Clipboard > Jump to copied content
CTRL+ALT+v       script-message-to smartcopypaste_II paste-specific                                                     #menu: Open > Clipboard > Add copied content to playlist
#                script-message-to webtorrent toggle-info;show-text ''                                                  #menu: Open > Youtube-dl > Toggle torrent OSD
CTRL+F           script-message-to quality_menu video_formats_toggle                                                    #menu: Open > Youtube-dl > Toggle ytdl video selection menu
ALT+F            script-message-to quality_menu audio_formats_toggle                                                    #menu: Open > Youtube-dl > Toggle ytdl audio selection menu
#                script-message-to quality_menu reload                                                                  #menu: Open > Youtube-dl > ytdl reload
#                ignore                                                                                                 #menu: Open > ---
#                script-binding recentmenu/open                                                                         #menu: Open > Recently played #@recent

##⇘⇘uosc level 1 menu: File
SHIFT+F11        stop                                                                                                   #menu: File > Stop
ALT+t            cycle ontop;show-text "Always on top:${ontop}"                                                         #menu: File > Toggle always on top      #@state=(ontop and 'checked')
ALT+b            cycle window-maximized                                                                                 #menu: File > Toggle maximize            #@state=(window_maximized and 'checked')
ENTER            cycle fullscreen                                                                                       #menu: File > Toggle fullscreen          #@state=(fullscreen and 'checked')
i                script-binding stats/display-stats                                                                     #menu: File > Show statistics temporarily
I                script-binding stats/display-stats-toggle                                                              #menu: File > Show statistics persistently
l                ab-loop                                                                                                #menu: File > Set/Clear A-B loop
L                cycle-values loop-file inf no;show-text "Loop:${loop-file}"                                            #menu: File > Toggle loop playback      #@state=(loop_file and 'checked')
n                script-message playlistmanager shuffle                                                                 #menu: File > Shuffle
[                no-osd add      speed -0.1; script-message-to uosc flash-speed                                         #menu: File > Speed > Speed -0.1
]                no-osd add      speed  0.1; script-message-to uosc flash-speed                                         #menu: File > Speed > Speed +0.1
{                no-osd multiply speed  0.5; script-message-to uosc flash-speed                                         #menu: File > Speed > Half speed
}                no-osd multiply speed  2.0; script-message-to uosc flash-speed                                         #menu: File > Speed > Double speed
BS               no-osd set      speed  1.0; script-message-to uosc flash-speed                                         #menu: File > Speed > Reset speed
ALT+o            script-message-to uosc show-in-directory                                                               #menu: File > Locate current file
DEL              script-message-to delete_current_file delete-file 1  "Please press 1 to confirm deletion"              #menu: File > Delete current file

##⇘⇘uosc level 1 menu: Navigation
#                show-text ${track-list} 5000                                                                           #menu: Navigation > Show OSD track info
O                no-osd cycle-values osd-level 3 1                                                                      #menu: Navigation > Toggle OSD timeline display
F4               script-binding select/menu;show-text ''                                                                #menu: Navigation > OSD interactive menu > Comprehensive menu
F5               script-message-to playlistmanager showplaylist;show-text ''                                            #menu: Navigation > OSD interactive menu > Playlist
F6               script-binding select/select-audio-device;show-text ''                                                 #menu: Navigation > OSD interactive menu > Audio device list
#                script-binding select/select-edition;show-text ''                                                      #menu: Navigation > OSD interactive menu > Editions list
F7               script-binding select/select-chapter;show-text ''                                                      #menu: Navigation > OSD interactive menu > Chapters list
F8               script-binding select/select-track;show-text ''                                                        #menu: Navigation > OSD interactive menu > Tracks list
F9               script-binding select/select-vid;show-text ''                                                          #menu: Navigation > OSD interactive menu > Video tracks list
F10              script-binding select/select-aid;show-text ''                                                          #menu: Navigation > OSD interactive menu > Audio tracks list
F11              script-binding select/select-sid;show-text ''                                                          #menu: Navigation > OSD interactive menu > Subtitles tracks list
ALT+c            script-message-to chapter_make_read create_chapter                                                     #menu: Navigation > Chapter creation > Mark chapter time
ALT+e            script-message-to chapter_make_read edit_chapter                                                       #menu: Navigation > Chapter creation > Edit chapter title
ALT+r            script-message-to chapter_make_read remove_chapter                                                     #menu: Navigation > Chapter creation > Delete current chapter
ALT+w            script-message-to chapter_make_read write_chapter chp                                                  #menu: Navigation > Chapter creation > Create chp chapter file
ALT+g            script-message-to chapter_make_read write_chapter ogm                                                  #menu: Navigation > Chapter creation > Create ogm chapter file
<                playlist-prev;show-text "Playlist:${playlist-pos-1}/${playlist-count}"                                 #menu: Navigation > Previous file
>                playlist-next;show-text "Playlist:${playlist-pos-1}/${playlist-count}"                                 #menu: Navigation > Next file
PGDWN            add chapter -1                                                                                         #menu: Navigation > Previous chapter
PGUP             add chapter  1                                                                                         #menu: Navigation > Next chapter
F3               script-message-to chapterskip skip-to-silence;show-text "Jump to next silent position"                 #menu: Navigation > Jump to next silent position
ALT+q            script-message-to chapterskip chapter-skip                                                             #menu: Navigation > Toggle chapter skip mode
ALT+n            script-message-to chapterskip toggle-markskip                                                          #menu: Navigation > Mark opening/ending
,                frame-back-step;show-text "Current frame:${estimated-frame-number}"                                    #menu: Navigation > Seek > Previous frame
.                frame-step     ;show-text "Current frame:${estimated-frame-number}"                                    #menu: Navigation > Seek > Next frame
RIGHT            seek  5                                                                                                #menu: Navigation > Seek > Forward 5 seconds
LEFT             seek -5                                                                                                #menu: Navigation > Seek > Backward 5 seconds
UP               seek  60                                                                                               #menu: Navigation > Seek > Forward 1 minute
DOWN             seek -60                                                                                               #menu: Navigation > Seek > Backward 1 minute
SHIFT+RIGHT      seek  1 exact                                                                                          #menu: Navigation > Seek > Exact forward 1 second
SHIFT+LEFT       seek -1 exact                                                                                          #menu: Navigation > Seek > Exact backward 1 second
SHIFT+UP         seek  80 exact                                                                                         #menu: Navigation > Seek > Exact forward 80 seconds
SHIFT+DOWN       seek -80 exact                                                                                         #menu: Navigation > Seek > Exact backward 80 seconds
CTRL+z           script-message-to undoredo undo                                                                        #menu: Navigation > Jump > Undo jump
CTRL+x           script-message-to undoredo redo                                                                        #menu: Navigation > Jump > Redo jump
CTRL+ALT+z       script-message-to undoredo undoLoop                                                                    #menu: Navigation > Jump > Loop jump

##⇘⇘uosc level 1 menu: Video
#                set video-aspect-override no;show-text "Aspect ratio:${video-aspect-override}"                         #menu: Video > Toggle aspect ratio > Default
#                set video-aspect-override "16:9";show-text "Aspect ratio:${video-aspect-override}"                     #menu: Video > Toggle aspect ratio > 16:9
#                set video-aspect-override "4:3";show-text "Aspect ratio:${video-aspect-override}"                      #menu: Video > Toggle aspect ratio > 4:3
#                set video-aspect-override "2.35:1";show-text "Aspect ratio:${video-aspect-override}"                   #menu: Video > Toggle aspect ratio > 2.35:1
A                cycle-values video-aspect-override 16:9 4:3 2.35:1 no ;show-text "Aspect ratio:${video-aspect-override}" #menu: Video > Toggle aspect ratio > Cycle
CTRL+LEFT        cycle-values video-rotate 0 270 180 90;show-text "Video rotation:${video-rotate}"                      #menu: Video > Rotate left
CTRL+RIGHT       cycle-values video-rotate 0 90 180 270;show-text "Video rotation:${video-rotate}"                      #menu: Video > Rotate right
CTRL+-           add window-scale -0.1;show-text "Zoom out window:${window-scale}"                                      #menu: Video > Video zoom > Zoom out window
CTRL+=           add window-scale  0.1;show-text "Zoom in window:${window-scale}"                                       #menu: Video > Video zoom > Zoom in window
ALT+-            add video-zoom   -0.1;show-text "Zoom out video:${video-zoom}"                                         #menu: Video > Video zoom > Zoom out video
ALT+=            add video-zoom    0.1;show-text "Zoom in video:${video-zoom}"                                          #menu: Video > Video zoom > Zoom in video
ALT+LEFT         add video-pan-x  -0.1;show-text "Pan left:${video-pan-x}"                                              #menu: Video > Video zoom > Pan left
ALT+RIGHT        add video-pan-x   0.1;show-text "Pan right:${video-pan-x}"                                             #menu: Video > Video zoom > Pan right
ALT+UP           add video-pan-y  -0.1;show-text "Pan up:${video-pan-y}"                                                #menu: Video > Video zoom > Pan up
ALT+DOWN         add video-pan-y   0.1;show-text "Pan down:${video-pan-y}"                                              #menu: Video > Video zoom > Pan down
ALT+p            cycle-values panscan 0.0 1.0;show-text "Crop to fill:${panscan}"                                       #menu: Video > Toggle crop to fill        #@state=(panscan and 'checked')
#                ignore                                                                                                 #menu: Video > ---
ALT+BS           set video-zoom 0;set panscan 0;set video-rotate 0;set video-pan-x 0;set video-pan-y 0;set video-aspect-override no;show-text "Reset video operations"        #menu: Video > Reset above video operations
#                ignore                                                                                                 #menu: Video > ---
CTRL+I           cycle icc-profile-auto   ;show-text "ICC auto calibration:${icc-profile-auto}"                         #menu: Video > Toggle auto ICC calibration   #@state=(icc_profile_auto and 'checked')
#                cycle sigmoid-upscaling;show-text "Nonlinear color conversion:${sigmoid-upscaling}"                    #menu: Video > Toggle nonlinear color conversion  #@state=(sigmoid_upscaling and 'checked')
1                add contrast -1;show-text "Contrast:${contrast}"                                                       #menu: Video > Color adjustment > Contrast -1
2                add contrast  1;show-text "Contrast:${contrast}"                                                       #menu: Video > Color adjustment > Contrast +1
3                add brightness -1;show-text "Brightness:${brightness}"                                                 #menu: Video > Color adjustment > Brightness -1
4                add brightness  1;show-text "Brightness:${brightness}"                                                 #menu: Video > Color adjustment > Brightness +1
5                add gamma -1;show-text "Gamma:${gamma}"                                                                #menu: Video > Color adjustment > Gamma -1
6                add gamma  1;show-text "Gamma:${gamma}"                                                                #menu: Video > Color adjustment > Gamma +1
7                add saturation -1;show-text "Saturation:${saturation}"                                                 #menu: Video > Color adjustment > Saturation -1
8                add saturation  1;show-text "Saturation:${saturation}"                                                 #menu: Video > Color adjustment > Saturation +1
-                add hue -1;show-text "Hue:${hue}"                                                                      #menu: Video > Color adjustment > Hue -1
=                add hue  1;show-text "Hue:${hue}"                                                                      #menu: Video > Color adjustment > Hue +1
CTRL+BS          set contrast 0;set brightness 0;set gamma 0;set saturation 0;set hue 0;show-text "Reset color adjustment" #menu: Video > Color adjustment > Reset
D                cycle deband;show-text "Deband:${deband}"                                                              #menu: Video > Deband > Deband toggle          #@state=(deband and 'checked')
ALT+z            add   deband-iterations +1;show-text "Increase deband strength:${deband-iterations}"                  #menu: Video > Deband > Deband strength +1
ALT+x            add   deband-iterations -1;show-text "Decrease deband strength:${deband-iterations}"                  #menu: Video > Deband > Deband strength -1
h                cycle-values tone-mapping auto spline bt.2390 hable bt.2446a st2094-40 st2094-10;show-text "HDR tone-mapping curve:${tone-mapping}"   #menu: Video > HDR related > Toggle HDR tone-mapping curve
ALT+h            cycle-values hdr-compute-peak yes no;show-text "HDR dynamic mapping:${hdr-compute-peak}"               #menu: Video > HDR related > Toggle HDR dynamic mapping  #@state=(hdr_compute_peak and 'checked')
CTRL+h           cycle target-colorspace-hint;show-text "HDR passthrough mode:${target-colorspace-hint}"                #menu: Video > HDR related > Toggle HDR passthrough mode  #@state=(target_colorspace_hint and 'checked')
CTRL+t           cycle-values target-trc auto pq gamma2.2;show-text "Display transfer characteristic:${target-trc}"     #menu: Video > HDR related > Toggle display transfer characteristic
CTRL+T           cycle-values hdr-reference-white 100 203;show-text "HDR reference white luminance:${hdr-reference-white}" #menu: Video > HDR related > Toggle HDR reference white luminance
CTRL+g           cycle gamut-mapping-mode ;show-text "Gamut mapping mode:${gamut-mapping-mode}"                         #menu: Video > HDR related > Toggle gamut mapping mode
#                cycle tone-mapping-visualize;show-text "Tone-mapping visualization mode:${tone-mapping-visualize}"     #menu: Video > HDR related > Toggle tone-mapping visualization mode
#                ignore                                                                                                 #menu: --- 

