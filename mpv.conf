# Scripts, Filters, Shaders #
####################

gpu-shader-cache-dir="~~/cache/shaders_cache"                                   # Specify the directory to store compiled GPU shaders to speed up startup. Enabled by default
                                                                                ## Note! If not placed under APPDATA, ensure the folder has user write permission
                                                                                ## Caching generated shaders is meant to accelerate, but insufficient hard disk IO performance may have the opposite effect. Decide whether to disable it based on the actual situation
##⇘⇘Script section
## Built-in script switches (if there is no specific purpose, do not disable mpv's built-in features)
#load-scripts=no                                                                # Automatically load all external scripts in the scripts subdirectory of the configuration file directory. Default yes. When set to no, you can use the example command in the next line to load specified external scripts. Not recommended
#scripts="~~/scripts/autoload.lua;~~/scripts/playlistmanager.lua;~~/scripts/open_dialog.lua"
#load-auto-profiles=no                                                          # <yes|no|default auto> Enable mpv's built-in conditional configuration script [auto_profiles.lua]
#load-osd-console=no                                                            # Enable mpv's built-in console script [console.lua]. Default yes
#load-stats-overlay=no                                                          # Enable mpv's built-in statistics script [stats.lua]. Default yes
#load-select=no                                                                 # Enable mpv's built-in selection menu script [select.lua]. Default yes
load-context-menu=yes                                                           # Enable mpv's built-in menu drawing script [context_menu.lua]. Default no on Windows
#ytdl=no                                                                        # Enable mpv's built-in URL parsing enhancement script [ytdl-hook.lua]. Default yes
#ytdl-format=bestvideo*+bestaudio/best                                          # <ytdl|best|worst|mp4|webm|...> Video format/quality passed directly to youtube-dl
                                                                                ## ytdl does not pass the --format option to youtube-dl, so it does not override its default value. Note that sometimes youtube-dl returns formats that mpv cannot use, in which case the mpv default may be better
#ytdl-extract-chapters=no                                                       # <default yes|no> Enable extracting chapters from youtube-dl video descriptions
#ytdl-raw-options=sub-langs="zh.*",write-subs=,write-auto-subs=
#ytdl-raw-options-append=write-subs=
#ytdl-raw-options-append=yes-playlist=
#ytdl-raw-options-append=cookies-from-browser=Firefox                           # Pass and use browser cookies. Supports Firefox, Chrome, Chromium, Edge, Opera, Vivaldi, and other browsers
                                                                                ## Note: The cookies-from-browser option requires the browser to be logged into the target website and the cookies not to be expired
                                                                                ## For Chromium-based browsers (Chrome, Edge, etc.), all processes need to be closed to read cookies, or use --ytdl-raw-options-append=cookies=cookies.txt
#ytdl-raw-options-append=cookies=[D:/cookies.txt]                               # Pass and use a cookies.txt file. Only absolute paths are supported
#ytdl-raw-options-append=proxy=http://127.0.0.1:7890
                                                                                # [Effective when using yt-dlp/youtube-dl to parse URLs] --ytdl-raw-options=<key>=<value>[,<key>=<value>[,...]] Pass custom options to ytdl https://github.com/yt-dlp/yt-dlp#usage-and-options
                                                                                ## It is better to append multiple parameters independently, i.e., write multiple --ytdl-raw-options-append parameters. https://mpv.io/manual/master/#options-ytdl-raw-options
#stream-lavf-o-append=http_proxy=http://127.0.0.1:7890                          # [Effective when using libavformat to parse URLs] --stream-lavf-o-append=<key>=<value>[,<key>=<value>[,...]] Pass custom options to libavformat
                                                                                ## It is better to append multiple parameters independently, i.e., write multiple --stream-lavf-o-append parameters. https://mpv.io/manual/master/#options-stream-lavf-o
                                                                                ## Note that the proxy set by this option is also passed to ytdl and other network requests
#input-builtin-bindings=no                                                      # Disable loading of mpv's built-in key bindings during startup. This option does not affect key bindings of externally loaded scripts
input-default-bindings=no                                                       # Disable mpv's built-in key bindings and key binding schemes of externally loaded scripts via --mp.add_key_binding
                                                                                ## Can effectively resolve script key binding conflicts. After enabling, you need to specify the desired key bindings in input.conf

##⇘⇘Filter section
## Format for specifying audio/video filters to start with MPV (multiple filters supported) --af/vf=filter①=parameter❶=value:parameter❷=value,filter②...
## Only one --af and --vf can exist each. If you don't want to use just this single parameter, you can break it down, for example, using --vf-toggle to append more filters individually without overwriting the filter specified by --vf=<value>
## Filters of the same category are mutually exclusive

## Multi-channel audio channel adjustment to prevent background music or dialogue from being too quiet (for two-channel devices)
#af-toggle=@dynaudnorm:lavfi=[dynaudnorm=f=500:g=31:p=0.5:m=5:r=0.9]
#af-toggle=@dynaudnorm:!dynaudnorm=p=0.65:r=0.9
## Another set of examples
#af-toggle=@loudnorm:lavfi=[loudnorm=I=-16:TP=-1.5:LRA=11]
#af-toggle=@loudnorm:!loudnorm=I=-25:TP=-1.5:LRA=4:linear=false

## Choose one of three audio speed change filters (the current default is good enough)
#af=scaletempo=scale=1.0:stride=60:overlap=.20:search=14:speed=tempo
                                                                                # Audio speed change filter used by older versions of mpv. The example values are default parameters
                                                                                # scale=<N> controls additional video acceleration; stride=<N> too high can cause audio skipping at high speeds and echo at low speeds, too low can change pitch. Increasing value improves performance
                                                                                # overlap=<N> overlap percentage. Decreasing value improves separation and performance; search=<N> length (milliseconds) to search for the best overlap position. Decreasing value improves performance
                                                                                # speed=<tempo|pitch|both|none> tempo synchronizes tempo and speed, pitch causes stuttering and is not used, both synchronizes both tempo and pitch, none ignores speed changes
#af=scaletempo2=min-speed=0.25:max-speed=4.0:search-interval=30:window-size=20  
                                                                                # This parameter is the audio filter automatically activated by default during speed change playback. It mutes directly outside the min/max-speed=<N> range. scaletempo2 has higher audio quality
#af=rubberband                                                                  # Audio quality falls between scaletempo and scaletempo2. Many adjustable parameters; see official documentation for details. Here, we just use the default parameters 

#vf-toggle=fps=fps=60/1.001                                                     # Force video output at a specified frame rate (this conflicts with interpolation). Usually used to enhance the smoothness of scrolling danmaku. Not recommended to use --sub-fps=<value>. The numerator (rounded) should be your monitor's refresh rate
#vf-toggle=@rtx-hdr:d3d11vpp=nvidia-true-hdr                                    # [Effective when --gpu-api=d3d11]. NVIDIA RTX VIDEO HDR video filter, used to inversely map SDR to HDR in HDR output environments. Performs well and is superior to gpu-next's inverse mapping. Applicable to supported NVIDIA graphics cards and drivers
                                                                                ## To use, please apply it correctly via the [RTX-HDR] conditional configuration group below
#vf-toggle=@rtx-vsr:d3d11vpp=format=nv12:scale=2:scaling-mode=nvidia            # [Effective when --gpu-api=d3d11]. NVIDIA RTX VSR video filter, used to enable NVIDIA's super-resolution technology. The effect is not as good as mpv's third-party super-resolution shaders and has higher power consumption. Not recommended. Applicable to supported NVIDIA graphics cards and drivers

##⇘⇘Shader section
### Shader-related settings are configured using configuration groups. The following are only parameter examples. For specific settings, see the relevant configuration group parameters in [General Parameter Supplement Area] and [Configuration Groups] below
## --glsl-shaders=<value> is used to specify shaders to be started with MPV each time (multiple shaders supported)
## Example of loading multiple shaders initially:
#glsl-shaders="~~/shaders/igv/KrigBilateral.glsl;~~/shaders/igv/FSRCNNX_x2_8-0-4-1.glsl;~~/shaders/igv/FSRCNNX_x2_8-0-4-1.glsl;~~/shaders/igv/SSimSuperRes.glsl;~~/shaders/igv/SSimDownscaler.glsl"
#glsl-shaders="~~/shaders/Anime4K/glsl/Restore/Anime4K_Clamp_Highlights.glsl;~~/shaders/Anime4K/glsl/Restore/Anime4K_Restore_CNN_Soft_M.glsl;~~/shaders/Anime4K/glsl/Upscale/Anime4K_Upscale_CNN_x2_S.glsl"

## --glsl-shaders-append is equivalent to --glsl-shader=<value> (note the difference from the parameter description in the previous line), indicating appending a shader (only one can be appended at a time). It does not overwrite the shader specified by the first --glsl-shaders=<value> and can be appended infinitely
#glsl-shaders-append="~~/shaders/other/PixelClipper.glsl"                       # Anti-ringing shader, mainly used for mpv's internal EWA scaling algorithms. Performs slightly better than the AR algorithm inside --vo=gpu-next
#glsl-shaders-append="~~/shaders/other/JointBilateral.glsl"                     # Bilateral chroma upscaling shader - Gaussian version, using the luma plane as a guide to achieve sharper edges without introducing any ringing. Only available under --vo=gpu-next
#glsl-shaders-append="~~/shaders/other/nlmeans_luma.glsl"                       # Denoising shader, performs well, but has high performance cost. Only available under --vo=gpu-next. Should be placed at the very beginning of the priority list, otherwise denoising after upscaling will significantly reduce its effectiveness
#glsl-shaders-append="~~/shaders/other/colorlevels.glsl"                        # Shader for adjusting RGB output range. If needed, adjust the REFBLACK and REFWHITE values in the shader according to the actual device situation, otherwise the output image may not behave as expected
#glsl-shaders-append="~~/shaders/igv/KrigBilateral.glsl"                        # Advanced cscale chroma upscaling algorithm. When active, it overrides the specified --cscale=xxxxx algorithm. Currently the best chroma upscaling shader
#glsl-shaders-append="~~/shaders/igv/FSRCNNX_x2_8-0-4-1.glsl"                   # Fast Super-Resolution Convolutional Neural Network upscaling algorithm. Minimum scaling trigger ratio is 1.2. When active, it overrides the specified --scale=xxxxx algorithm
#glsl-shaders-append="~~/shaders/igv/FSRCNNX_x2_16-0-4-1.glsl"                  # Fast Super-Resolution Convolutional Neural Network upscaling algorithm. The 16x variant has better quality but higher power consumption. Minimum scaling trigger ratio is 1.2. When active, it overrides the specified --scale=xxxxx algorithm
#glsl-shaders-append="~~/shaders/igv/FSRCNNX_x1_16-0-4-1_distort.glsl"          # Fast Super-Resolution Convolutional Neural Network de-artifact algorithm. De-artifact variant, no trigger ratio
#glsl-shaders-append="~~/shaders/nnedi3/nnedi3-nns32-win8x4.glsl"               # Very high-quality interpolation upscaling algorithm. Minimum scaling trigger ratio is 1.2. Very high power consumption. nns16 → nns32 → nns64 → nns128 → nns256; win8x4 → win8x6 has better quality but significantly higher performance cost
#glsl-shaders-append="~~/shaders/ravu/ravu-zoom-ar-r3.glsl"                     # ravu upscaling algorithm zoom variant, general-purpose, trigger ratio > 1, upscales to target resolution. When active, it overrides the specified --scale=xxxxx algorithm
#glsl-shaders-append="~~/shaders/ravu/ravu-lite-ar-r3.glsl"                     # ravu upscaling algorithm lite variant, general-purpose, minimum scaling trigger ratio is approximately 1.2. The sharpest variant. When active, it overrides the specified --scale=xxxxx algorithm
#glsl-shaders="~~/shaders/AnimeJaNaiV3L1/AnimeJaNaiV3L1_HD_x2.glsl"             # AnimeJaNaiV3 upscaling algorithm. Excellent at handling artifacts while preserving the original art style as much as possible. A better anime shader than Ani4K and Anime4K. Performance cost is relatively high, requiring some pre-compilation wait time on first load (the program may temporarily freeze)
#glsl-shaders="~~/shaders/Ani4K/Ani4Kv2_ArtCNN_C4F32_i2.glsl"                   # Ani4k upscaling algorithm. Excellent at handling artifacts while preserving the original art style as much as possible. A better anime shader than Anime4K. However, the performance cost is very high; use according to your device's capabilities
                                                                                # Must be used under --vo=gpu-next. The CMP variant is only applicable to --gpu-api=vulkan
#glsl-shaders-append="~~/shaders/Anime4K/glsl/Restore/Anime4K_Restore_CNN_Soft_M.glsl" 
                                                                                # Anime4k upscaling algorithm module (moderate image restoration + weak perceptual enhancement + minimal artifact introduction). The CNN variant has a minimum scaling trigger ratio of 1.2. The Restore_CNN_Soft anti-aliasing softening variant is recommended, which reduces the generation of ringing and other artifacts
                                                                                # Introduction and usage of Anime4k shaders: https://hooke007.github.io/mpv-lazy/[01]_%E7%AC%AC%E4%B8%89%E6%96%B9%E7%9D%80%E8%89%B2%E5%99%A8%E4%BB%8B%E7%BB%8D.html
#glsl-shaders-append="~~/shaders/igv/SSimSuperRes.glsl"                         # Corrects mpv's built-in --scale=xxxxx upscaling algorithm (eliminates ringing artifacts, restores original sharpness, etc.)
#glsl-shaders-append="~~/shaders/igv/SSimDownscaler.glsl"                       # Enhances the downscaling algorithm. Use with --linear-downscaling=no. #! May cause degradation for unknown reasons when used with --vo=gpu-next
#glsl-shaders-append="~~/shaders/igv/adaptive-sharpen.glsl"                     # Adaptive sharpening algorithm shader


##################
# General Parameter Supplement Area #
##################

#d3d11-output-csp=pq                          # [Requires --gpu-api=d3d11] This parameter is used for direct HDR output and does not support conditional configuration, affecting SDR playback
                                              # The current version requires manually turning on the system HDR first
#use-filedir-conf                             # Load configuration file from the directory of the playing file
#include="~~/profiles.conf"                   # Append and read the specified configuration file
                                              # All configuration group parameters below this point can also be placed separately in "~~/profiles.conf". The effect is the same when this parameter is enabled
#input-conf="~~/input.conf"                   # Specify the input configuration file for key bindings
#libplacebo-opts=tone_map_metadata=cie_y
                                              # Pass additional raw options to the libplacebo rendering backend (used by --vo=gpu-next) for debugging purposes
                                              # Detailed parameters: http://libplacebo.org/options
                                              # The example parameter forces the use of peak detection for hdr tone mapping

##⇘⇘The following are parameters for enabling regular configuration groups. Choose as needed
#profile=ICC                                  # icc color management configuration group, using the ICC display profile specified by the operating system's display settings
#profile=ICC+                                 # icc color management configuration group, using a generic ICC profile from color.org or a professional calibration file. Choose the ICC profile corresponding to your monitor's color gamut
profile=Target                                # target color management configuration group, cannot coexist with icc color management
profile=Dither                                # Dithering algorithm configuration group (fruit). Effect is close to error-diffusion, lower power consumption
#profile=Dither+                              # Dithering algorithm configuration group (error-diffusion). Error diffusion color depth dithering algorithm, best effect but also most power-consuming
profile=Tscale                                # [Requires commenting out --tscale=<value> before enabling] Temporal interpolation algorithm. See the configuration group with the same name below for specific parameters
#profile=Tscale+                              # [Requires commenting out --tscale=<value> before enabling] Alternative temporal interpolation algorithm. See the configuration group with the same name below for specific parameters
profile=HQ                                    # Most commonly used built-in algorithm configuration group
profile=DeBand-low                            # [Requires commenting out --deband before enabling] Preset debanding solution. See the configuration group with the same name below for specific parameters. Close to madvr's deband set to low. Using low already provides good results
#profile=DeBand-medium                        # [Requires commenting out --deband before enabling] Alternative debanding solution. See the configuration group with the same name below for specific parameters. Close to madvr's deband set to medium
#profile=DeBand-high                          # [Requires commenting out --deband before enabling] Alternative debanding solution. See the configuration group with the same name below for specific parameters. Close to madvr's deband set to high
profile=HDR2SDR                               # HDR to SDR mapping parameter configuration group
                                              # This configuration group does not affect the HDR passthrough configuration on HDR devices. There is no need to comment it out when configuring HDR passthrough, but it will affect the display of SDR content
                                              # Under HDR passthrough, the dynamic mapping and algorithms in this configuration group may still be applied (when the HDR image brightness exceeds the display's peak brightness)
#profile=SDR2HDR                              # SDR to HDR mapping parameter configuration group. Only effective in HDR display mode. Not recommended. Only available under --vo=gpu-next
#profile=SWscaler                             # Alternative software scaling solution

## The following are shader configuration groups. You can enable any of the following required configuration groups as needed (this will override the --glsl-shaders-append parameters above)
profile=NNEDI3                                # Suitable for most scenarios (NNEDI3-32)               ## Performs well in the vast majority of scenarios, with better adaptability than other configurations (suppresses aliasing and ringing artifacts). Prefer this configuration for general use
#profile=NNEDI3+                              # Suitable for most scenarios (NNEDI3-64)               ## Theoretically, NNEDI3-64 and above variants have better ringing artifact suppression, but the power consumption increases exponentially. Choose based on your device's performance
#profile=ravu-zoom                            # Suitable for most scenarios (ravu-zoom)               ## Upscales to target resolution. Magnification beyond 4x is less effective than mpv's internal ewa scale algorithms
#profile=FSRCNNX                              # Suitable for HD scenarios (FSRCNNX)                   ## Effect is similar to madvr's NGU Sharp, but generates more ringing artifacts. Performs poorly on low-resolution images
#profile=FSRCNNX+                             # Suitable for SD scenarios (FSRCNNX_distort)           ## Excellent ringing artifact suppression for low-resolution images, but may still have a smeared appearance
#profile=AnimeJaNai                           # Suitable for most anime (AnimeJaNai)              ## Excellent at handling artifacts while preserving the original art style. A better anime shader than Ani4K and Anime4K. Performance cost is relatively high, requiring some pre-compilation wait time on first load (the program may temporarily freeze)
#profile=Ani4K                                # Suitable for most anime (Ani4k)                   ## Excellent at handling artifacts while preserving the original art style. A better anime shader than Anime4K. However, performance cost is very high; use according to your capabilities
#profile=AniSD                                # Suitable for SD anime (AniSD)                     ## Excellent at handling artifacts in SD anime while preserving the original art style. A better anime shader than Anime4K. However, performance cost is very high; use according to your capabilities
#profile=Anime4K                              # Suitable for most anime (Anime4k de-artifact anti-aliasing)    ## Effectively suppresses artifacts like aliasing and ringing, but still has noticeable smearing degradation
#profile=SSIM                                 # Suitable for low performance consumption

##############
# Regular Configuration Groups #
##############

##⇘⇘Regular configurations have no automatic trigger conditions (built-in configuration groups are also all regular configurations)
## Use --profile=<profile1,profile2,...> or multiple lines of --profile=<xxx> in the main settings file to activate several configurations

[ICC]
 icc-profile=""
 icc-profile-auto
 icc-intent=0
 icc-force-contrast=1000
 icc-3dlut-size=auto
 icc-cache-dir="~~/cache/icc_cache"

[ICC+]
 icc-profile="~~/icc/ITU-RBT709ReferenceDisplay.icc"
 icc-intent=0
 icc-force-contrast=no
 icc-3dlut-size=auto
 icc-cache-dir="~~/cache/icc_cache"

[Target]
 icc-profile=""
 icc-profile-auto=no
 target-prim=auto
 #target-trc=gamma2.2
 #target-peak=203
 target-contrast=auto
 #sdr-adjust-gamma=no
 #treat-srgb-as-power22=no

[Dither]
 dither-depth=auto
 dither=fruit
 dither-size-fruit=6

[Dither+]
 dither-depth=auto
 dither=error-diffusion
 error-diffusion=floyd-steinberg

[Tscale]
 video-sync=display-resample
 #video-sync-max-video-change=5
 interpolation
 #interpolation-preserve=no
 tscale=oversample

[Tscale+]
 video-sync=display-resample
 #video-sync-max-video-change=5
 interpolation
 #interpolation-preserve=no
 tscale=sphinx
 tscale-blur=0.65

[HQ]
 scale=ewa_lanczossharp
 cscale=bilinear
 dscale=catmull_rom
 scale-antiring=0.5
 dscale-antiring=0.5
 linear-upscaling=no
 sigmoid-upscaling=yes
 correct-downscaling=yes
 linear-downscaling=no
 #scaler-resizes-only=no
 deband=no

[DeBand-low]
 profile-desc=DeBand low
 deband-iterations=1
 deband-threshold=48
 deband-range=16
 deband-grain=16

[DeBand-medium]
 profile-desc=deband medium
 deband-iterations=2
 deband-threshold=64
 deband-range=16
 deband-grain=24

[DeBand-high]
 profile-desc=deband high
 deband-iterations=3
 deband-threshold=64
 deband-range=16
 deband-grain=24

[HDR2SDR]
 profile-desc=HDR-SDR mapping parameters
 tone-mapping=auto
 #tone-mapping-param=1.0
 #tone-mapping-max-boost=1.0
 gamut-mapping-mode=auto
 hdr-contrast-recovery=0.30
 #hdr-contrast-smoothness=3.5
 hdr-compute-peak=auto
 hdr-peak-percentile=99.995
 hdr-peak-decay-rate=20
 hdr-scene-threshold-low=1.0
 hdr-scene-threshold-high=3.0
 allow-delayed-peak-detect=no

[SDR2HDR]
 profile-desc=SDR to HDR inverse mapping parameters
 icc-profile=""
 icc-profile-auto=no
 target-prim=auto
 #target-gamut=dci-p3   # or adobe, for argb color gamut
 target-trc=auto
 target-peak=auto  # Under --gpu-api=vulkan, you must specify the display's peak luminance value. Under --gpu-api=d3d11, the default value automatically obtains this information
 target-colorspace-hint=auto
 inverse-tone-mapping=yes

##⇘⇘Alternative software scaling solution
## The software scaler is used when mpv needs to perform format conversion internally
[SWscaler]
 profile-desc=Software scaling configuration
 sws-allow-zimg=no                  # Prefer zimg (generally higher quality) over libswscale. Default yes. ffmpeg often has compatibility issues with zimg; disabling is recommended
 sws-scaler=bicublin                # [libswscale] <fast-bilinear|bilinear|bicubic default|x|point|area|bicublin|gauss|sinc|lanczos|spline>
                                    # [libswscale] Scaling algorithm (also affects the chroma plane)
 #sws-fast=yes                      # [libswscale] Optimize performance at the cost of quality. Default no
 zimg-scaler-chroma=bicubic         # [zimg] <point|bilinear|bicubic|spline16|spline36|lanczos default>
                                    # [zimg] Chroma upscaling algorithm
 #zimg-scaler-chroma-param-a=1/3    # [zimg] Sub-parameter for the chroma upscaling algorithm. Unaffected algorithms that do not support adjustment will use default
 #zimg-scaler-chroma-param-b=1/3
 zimg-scaler=bicubic                # [zimg] Scaling algorithm. See --zimg-scaler-chroma for available values
 zimg-scaler-param-a=1/3            # [zimg] Sub-parameter for the scaling algorithm
 zimg-scaler-param-b=1/3
 #zimg-dither=error-diffusion       # [zimg] <no|ordered|random default|error-diffusion> Color depth dithering algorithm
 zimg-fast=no                       # [zimg] Optimize performance at the cost of quality. Default yes


[NNEDI3]
 profile-desc=Suitable for most scenarios
 glsl-shaders="~~/shaders/nnedi3/nnedi3-nns32-win8x4.glsl;~~/shaders/igv/adaptive-sharpen_luma.glsl"

[NNEDI3+]
