##⇘⇘Basic instructions:
## If a line starts with the comment character "#", this option is disabled (i.e., restores MPV's default state). Remove it to enable.
## For some enabled parameters without "=", the actual value is "yes". For example, deband is disabled by default: --deband is equivalent to --deband=yes; similarly, --deband=no is equivalent to commenting out the parameter.
## Explanation of comment content —— # <optional value> [condition requirements] Parameter meaning explanation (supplement)

########
# Basic #
########

## Decoding
vo=gpu-next                           # <gpu/gpu-next/libmpv> Video output driver. Many subsequent options only work properly under these three. The current version's default value is gpu-next
                                      ## gpu is the old rendering backend, missing many new features; gpu-next is the successor to gpu; libmpv is designed for some frontends, generally not used
                                      ## gpu-next has implemented parsing and mapping of Dolby Vision RPU layer metadata, but does not yet support EL layer metadata parsing
                                      ## For specific differences between gpu-next and gpu, see the official wiki: https://github.com/mpv-player/mpv/wiki/GPU-Next-vs-GPU
gpu-api=d3d11                         # <opengl/vulkan/d3d11> [Recommended to set to d3d11 for SVP interpolation] Select graphics rendering API
                                      ## opengl is the least recommended. Windows native rendering is d3d11 (mpv's default for Windows, pay attention to setting adaptive power mode for the graphics card)
                                      ## You can set which graphics card mpv uses via d3d11-adapter. See documentation: https://mpv.io/manual/master/#options-d3d11-adapt
                                      ### Choice of gpu-api?
                                      ## Linux/macOS: vulkan or opengl, vulkan recommended
                                      ## Windows: vulkan, d3d11, and opengl are all optional. It is recommended to use the d3d11 native API, which has the best performance and implements 10-bit output
#gpu-context=auto                     # <win/dxinterop/angle/d3d11/winvk/macvk> Select output backend. This is usually automatically determined correctly by --gpu-api=<value>; when --gpu-api=opengl, angle is used by default, in which case it is better to change to win/dxinterop
#fbo-format=auto                      # Internal processing precision. This is usually automatically determined correctly by --gpu-api=<value>, with 16-bit or higher precision preferred by default. This parameter cannot be modified under --vo=gpu-next
#d3d11-exclusive-fs=yes               # Fullscreen exclusive under --gpu-api=d3d11
#d3d11-flip=no                        # [Usually occurs when --d3d11-exclusive-fs=yes and --on-top are used together] Can be used to avoid freeze issues when MPV is fullscreen
                                      # If the above issue exists, enable this parameter; otherwise, it should not be used because the flip model under d3d11 has the best performance. Tests show that under N-card drivers, flip mode has performance limitations, so it is recommended to disable it when encountering rendering bottlenecks
                                      # [When --gpu-context=angle also has fullscreen freeze issues] Use --angle-flip=no instead of d3d11-flip=no
#d3d11va-zero-copy=yes                # [When gpu-api=d3d11] By default, when using hardware decoding with --gpu-api=d3d11, video images are copied (GPU to GPU) from the decoder surface to shader resources.
                                      # Setting this option avoids copying by sampling directly from the decoder image. This may improve performance and reduce power consumption, but may cause incorrect sampling at the bottom and right edges of the image due to padding, and may cause driver errors because Direct3D 11 technically does not allow sampling from decoder surfaces (although most drivers support it.)
                                      # Can be enabled to try to improve performance when decoding stutters or drops frames
hwdec=auto-copy                       # Specify the hardware video decoding API to use. Change to no for software decoding. For hardware decoding on Windows, d3d11va or d3d12va-copy is recommended. d3d11va has the best hardware decoding support, providing native hardware acceleration for av1 format 4k60fps and 8k. Although nvdec supports yuv444 hardware decoding, this format is relatively rare and software decoding handles it without pressure.
                                      # --hwdec=auto-safe is equivalent to --hwdec=yes. When --gpu-api=d3d11, auto prefers d3d11va; when --gpu-api=vulkan, auto prefers nvdec. auto-copy prefers d3d11va-copy
                                      # Native hardware decoding without -copy, which is theoretically the most efficient, is not recommended to ensure that all settings/filters/shaders work properly (some do not support it). Note that native nvdec hardware decoding without -copy does not support d3d11, only vulkan and opengl
                                      ## You can also use a priority list of multiple values, e.g., vulkan-copy,nvdec-copy,auto means trying these decoding modes in order
                                      ## When using auto without specifying a specific hardware decoding API, it is recommended to use the auto-safe parameter, which will prioritize hardware decoding APIs actively supported by developers (d3d11va or nvdec on Windows)
                                      ## Hardware decoding modes may encounter some issues. It is recommended to prioritize software decoding (the official manual does not recommend using hardware decoding)
                                      ## Tests have found that copy hardware decoding mode under --vo=gpu will cause abnormal frame drops for 4K and above videos with frame rates >=60fps. It is recommended to use software decoding or native hardware decoding without copy.
#hwdec-codecs=all                     # Attempt hardware decoding for encoding formats within the selected range. The current version's default value is --hwdec-codecs="h264,vc1,hevc,vp8,vp9,av1,prores"
#hwdec-threads=0                      # Specify the number of threads for hardware decoding (default: 4). If set to 0, the number of threads will be automatically determined based on available CPU cores
#vd-lavc-dr=no                        # [When gpu-api=d3d11] Enable direct rendering (default: auto). If set to yes, video will be decoded directly to GPU video memory (or staging buffer)
                                      # If set to no, video will be decoded to system memory and then copied to GPU memory. This may reduce performance but may solve issues on some low-end Intel GPUs
                                      # The default value auto will automatically choose based on the decoder and GPU capabilities (i.e., automatically disable for low-end Intel GPU devices)
#vd-queue-enable=yes                  # Enable video decoder queue (default: no). If set to yes, the video decoder will run on a separate thread, which may reduce performance but may solve issues on some low-end Intel GPUs
#vd-lavc-threads=8                    # Number of threads for decoding. Whether threading is actually supported depends on the codec (default: 0). 0 means automatically detect the number of cores on the machine and use it, up to 16. You can manually set more than 16 threads
#vd-lavc-assume-old-x264=yes          # Assume the video was encoded by an old, buggy x264 version (default: no). Only try to enable this to solve ffmpeg compatibility issues with old x264 encoding when x264 yuv444p10 format video decoding errors occur
#opengl-pbo=yes                       # Enable PBO. On some drivers, this may be faster, especially if the source video size is large (e.g., so-called "4K" videos). On other drivers, it may be slower or cause latency issues
##⇘⇘Dual graphics laptop handling
#vd=h264_qsv,hevc_qsv,mpeg2_qsv,vp9_qsv,vp8_qsv,av1_qsv
                                      # Under configuration combinations like Intel integrated graphics & NVIDIA MX_x50, if using the discrete GPU for rendering, since MX series discrete GPUs have no decoding unit, even if hardware decoding is specified via hwdec, software decoding will still be used
                                      # Using this parameter allows the integrated GPU to perform hardware decoding and assist rendering while the discrete GPU does the main rendering (when hwdec=no, fast-forwarding may cause MPV to freeze, it is recommended to use xxxx-copy decoding mode)
#d3d11-adapter="NVIDIA GeForce RTX 2070 Super"
                                      # [When gpu-api=d3d11] Specify a graphics card as the main rendering output. By default, the system-specified main rendering graphics card is automatically selected
                                      # The graphics card name can be viewed in Task Manager and changed accordingly. This parameter is equivalent to setting mpv to run on the discrete GPU in the driver control panel
                                      # For example, when using the internal screen of an I+N dual-graphics laptop, the actual GPU used is "Intel(R) UHD Graphics". Modifying this example to specify the discrete GPU can reduce the 3D rendering usage of both GPUs in Task Manager
                                      # For most dual-graphics laptops when an external monitor is connected, it behaves similarly to "discrete GPU direct connection", and this parameter is not needed as the discrete GPU will be used automatically
                                      # [When gpu-api=vulkan] Use the --vulkan-device parameter instead of --d3d11-adapter
#vulkan-device="NVIDIA GeForce RTX 2070 Super"
                                      # [When gpu-api=vulkan] This parameter replaces --d3d11-adapter for specifying a graphics card
                                      # Default is empty, example value "NVIDIA GeForce RTX 2070 Super" (must use the full device name or UUID)

