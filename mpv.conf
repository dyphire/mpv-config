##############
# Conditional Configuration Groups #
##############

##⇘⇘Conditional trigger configurations activate specific parameters based on given conditions. See the example for a simple format
## Simply comment out --profile-cond and --profile-restore to turn a conditional configuration into a regular configuration. Regular configurations are used via --profile=<value> in the general area

##⇘⇘Example format for conditional configuration
##[FS-loop]                                                  # Configuration name, customizable
##profile-desc    = Loop current file when fullscreen        # Description of the configuration, not a parameter, free text
##profile-cond    = fullscreen                               # Condition to trigger this configuration. List of available properties: https://mpv.io/manual/master/#property-list
##profile-restore = copy                                     # This parameter is generally used to revert to general parameters before triggering (disabling this will preserve them)
##...                                                        # Then write the parameters to be triggered under this condition
##...

##⇘⇘Example of filename matching: trigger configuration based on specific characters in the filename
## The character "-" requires LUA escape character "%"
#[VCB-Studio]
#profile-desc=Vacuum Circuit Breaker
#profile-cond=filename:find("VCB%-Studio")~=nil
#profile-restore=copy
#deband=no

[SD]
 profile-desc=Low resolution source enhancement
 profile-cond=height <= 720 or width <= 720
 profile-restore=copy
 profile=FSRCNNX+

[Deband]
 profile-desc=Enable debanding for sources below YUV420P10 # Force disable for 8k video
 profile-cond=get("video-params/average-bpp") < 24 and not (get("video-params/w") > 7000 or get("video-params/h") > 3000)
 profile-restore=copy
 deband=yes

[hdr-2390]
 profile-cond=p.tone_mapping == "bt.2390" and p.current_vo == "gpu-next"
 profile-restore=copy
 tone-mapping-param=2.0

#[hdr-spline]
#profile-cond=p.tone_mapping == "spline"
#profile-restore=copy
#tone-mapping-param=1.0

[peak-percentile]
 profile-cond=get("video-params/avg-pq-y") < 0.21 and p.current_vo == "gpu-next"
 profile-restore=copy
 hdr-peak-percentile=99.8

[SDR-gamut]
 profile-desc=Gamut mapping for SDR content
 profile-cond=get("video-params/primaries") ~= "bt.709" and get("video-params/gamma") == "bt.1886"
 profile-restore=copy
 gamut-mapping-mode=clip

[SDR-target]
 profile-desc=SDR display target configuration
 profile-cond=get("video-params/gamma") == "bt.1886" and not get("inverse-tone-mapping") and p.current_vo == "gpu-next"
 profile-restore=copy
 target-colorspace-hint=no

#[RTX-HDR]
# When enabling, the [SDR-target] conditional configuration group above must be disabled for it to actually take effect
# profile-desc=SDR to HDR inverse mapping
# profile-cond=get("video-params/gamma") == "bt.1886" and get("video-target-params/max-luma") > 203 and p.current_vo == "gpu-next"
# profile-restore=copy
# inverse-tone-mapping=no
# target-colorspace-hint=auto
# vf-pre=@rtx-hdr:d3d11vpp=nvidia-true-hdr

[HDR]
 profile-desc=HDR configuration
 profile-cond=get("video-params/max-luma") > 203
 profile-restore=copy
 target-peak=auto
 target-colorspace-hint=auto
 target-colorspace-hint-mode=target
 hdr-reference-white=100
 blend-subtitles=no
 deband=no
 vf=""

[HDR-PASS]
 profile-desc=HDR passthrough parameters, only effective when HDR display mode is active
 profile-cond=get("video-params/max-luma") > 203 and get("video-target-params/max-luma") > 203 and p.current_vo == "gpu-next"
 profile-restore=copy
 icc-profile=""
 icc-profile-auto=no
 target-colorspace-hint=auto
 target-colorspace-hint-mode=target
 inverse-tone-mapping=no      # Inverse mapping cannot be enabled under HDR
 target-prim=auto
 #target-trc=scrgb            # Default auto, under HDR output it is pq
 #target-gamut=dci-p3         # or adobe, for argb color gamut
 target-trc=auto
 target-peak=auto             # Or you can specify the peak luminance value of the HDR display. The default value will automatically obtain this information
 target-contrast=auto         # Or you can specify the contrast value of the HDR display. The default value will automatically obtain this information
 #sub-hdr-peak=100            # Used to adjust the text subtitle brightness in HDR output. Lower values are darker
 #image-subs-hdr-peak=10000   # Used to adjust the image subtitle brightness in HDR output. Higher values are darker. The example shows the maximum value

[video-sync]
 profile-desc=Change the A/V sync mode when the audio speed adjustment exceeds the threshold to avoid noticeable pitch changes
 profile-cond=(speed * audio_speed_correction) > 0 and ((speed * audio_speed_correction) < 0.96 or (speed * audio_speed_correction) > 1.04) and not (get("estimated-vf-fps") > 47 or get("display-fps") > 120)
 profile-restore=copy-equal
 video-sync=display-tempo

[fps-fix]
 profile-desc=Fix abnormal power consumption or frame drops caused by excessively high video frame rate and display refresh rate
 profile-cond=get("estimated-vf-fps") > 47 or get("display-fps") > 120
 profile-restore=copy
 video-sync=audio

[8k-fix]
 profile-desc=Use d3d11va hardware decoding for 8k av1 to solve frame drop issues. This solution is only available under --gpu-api=d3d11
 profile-cond=get("video-params/w") > 7000 or get("video-params/h") > 3000
 profile-restore=copy
 hwdec=auto-safe
 video-sync=audio
 glsl-shaders=""
 deband=no
 vf=""

[pgs-fix]
 profile-desc=Fix subtitle misalignment caused by inconsistent aspect ratio between internally-embedded PGS subtitles and the video in domestic movie rips
 profile-cond=get("video-params/aspect") > 16 / 9
 profile-restore=copy
 stretch-image-subs-to-screen=yes

