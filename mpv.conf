window-corners=roundsmall             # <default|donotround|round|roundsmall> Control window corner rounding preference. default: let the system decide whether to round corners; donotround: disable corner rounding; round: enable corner rounding; roundsmall: enable corner rounding with a smaller radius
#window-maximized=yes                 # Run MPV with window automatically maximized (maximized in borderless mode is like "borderless windowed mode" rather than "fullscreen")
#background=none                      # <none|color|default tiles> If the frame has an alpha channel, specify which background method to use (if any) to blend with it. If there is no alpha channel, do nothing
                                      ## none: do not blend the frame and keep alpha as is; color: blend the frame with the background color (specified by --background-color, default is black)
                                      ## tiles: blend the frame with a 16x16 checkerboard pattern of the specified colors, specified by --background-tile-color-0 and --background-tile-color-1 (default are gray and white)
#border-background=none               # <none|color|default tiles|blur> Similar to --background, but only used to draw the parts of the mpv window not covered by video
#background-blur-radius=16            # <0-100> In --border-background=blur mode, specify the intensity of background blur. Default is 16
#background-color="#778899"           # <format (AA)RRGGBB> In --background=color mode, the color used to draw the parts of the mpv window not covered by video
#background-tile-color-0="#778899"    # <format (AA)RRGGBB> In --background=tiles mode, the color used to draw the parts of the mpv window not covered by video
#background-tile-color-1="#778899"    # <format (AA)RRGGBB> In --background=tiles mode, the color used to draw the parts of the mpv window not covered by video
#background-tile-size=16              # <1-4096> In --background=tiles mode, specify the size of the background pattern (in pixels). Default is 16
#hidpi-window-scale=yes               # <yes|default no> Whether to perform HIDPI scaling. This parameter may affect window size. Disabling keeps window size unaffected by DPI
                                      # By default, the initialized video window changes size with DPI. For example, opening an 800p video on a 4K display with 200% scaling will automatically zoom 2x to 1600p. Also affects some script content
#window-scale=1.0                     # Specify the scaling factor of the window relative to the original video size, default is 1.0
                                      # Only when hidpi-window-scale=no can the window be scaled to a true 1 (otherwise it will refer to the system DPI). Lower priority than geometry and --autofit parameters
#current-window-scale=1.0             # Same function as window-scale, but this can dynamically adjust the current window size at runtime
#auto-window-resize=yes               # <default yes|no> Whether to allow mpv to automatically adjust the window size when switching playback files. This option does not affect the functionality of geometry and autofit
#geometry=75%x70%                     # <[W[xH]][+-x+-y][/WS]>, <x:y> Specific window size (with window size freezing functionality) and/or position at startup (calculated from the nearest corner of the screen to the nearest corner of the video)
                                      # If different from the video aspect ratio, automatically fill with black bars. Even if stretched, try to maintain the set aspect ratio. After using this, --autofit series and --window-scale parameters will be invalid
#autofit=70%                          # <[W[xH]]> Initial window size and target size for scaling when playing files in windowed mode (percentage or pixels), default: 60%
#autofit-larger=90%x90%               # <[W[xH]]> Maximum percentage of the screen in windowed mode (e.g., opening a 4K video on an FHD screen results in an initially too large window)
autofit-smaller=40%x30%               # <[W[xH]]> Minimum percentage of the screen in windowed mode (e.g., opening a 480p video on a 4K screen results in an initially too small window)
#keepaspect=no                        # Default yes, by default MPV only stretches the video according to the source aspect ratio. Enabling this will always distort the video to fit the window size
#keepaspect-window=no                 # Default yes, by default MPV locks the window aspect ratio to the video aspect ratio. Enable this to achieve free window stretching behavior (fills with black bars around when keepaspect=yes)
#panscan=1.0                          # <0.0-1.0> Crop the video to fill the window (recommended to use with keepaspect-window=no)
