### Video-related settings are configured using configuration groups. The following are only parameter examples. For specific settings, see the relevant configuration group parameters in [General Parameter Supplement Area] and [Configuration Groups] below

##⇘⇘The following are settings related to ICC color management
#icc-profile="~~/icc/ITU-RBT709ReferenceDisplay.icc" 
                                      # Load the ICC profile and use it to convert video RGB to screen output. Choose the ICC profile corresponding to your monitor's color gamut. This option overrides --target-prim, --target-trc, and --icc-profile-auto options
                                      ## Since mpv's calibration target is bt.1886 (close to gamma=2.4), when the --icc-profile-auto parameter is enabled to use the system default (srgb) calibration file, because the (srgb) calibration file's transfer curve is usually srgb, it will cause abnormal mpv picture display
                                      ## To address the above issue, it is best to manually specify the gamma curve as gamma2.4 for the corresponding monitor's color gamut calibration file. The example parameter is for reference
#icc-profile-auto                     # If professional calibration has been done, it can be enabled (corresponding icm calibration document exists in the system directory). For wide color gamut screens without calibration, manually specify target-prim=<value>
                                      # Enabling color management allows videos in standard color spaces to display relatively correct colors on wide color gamut monitors. Turning it off will restore an oversaturated state
                                      # Currently, when mpv uses ICC color management, because the calibration curve target is bt.1886, some displays may experience color shifting and overly dark images. https://github.com/mpv-player/mpv/issues/8009
                                      ## Enabling the --icc-force-contrast=1000 parameter can solve the problem of overly dark images caused by extremely high contrast in some calibration files (for OLED screens, test the appropriate value yourself). #! Note: Still cannot solve the problem of overly dark images during HDR mapping
                                      # Alternatively, use the --target-prim=<value> parameter to manage color space
#icc-intent=0                         # ICC color conversion mapping intent. 0: perceptual, 1: relative colorimetric (default), 2: saturation, 3: absolute colorimetric. Perceptual mapping is recommended.  https://github.com/mpv-player/mpv/issues/8009#issuecomment-923607273
#icc-force-contrast=1000              # <no|0-1000000|inf> Color management. Override the static contrast data inside the ICC file. The default no means no override. For OLED, it can be set to inf (infinite) (if this data is missing from the ICC, it falls back to 1000). This only affects bt.1886 content display
                                      ## General LCD typically uses 1000 (based on the panel's native data); users of OLED display devices try using 1000000 or the special value inf. Setting LCD to 1000 can solve the issue of overly dark blacks caused by extremely high contrast in some calibration files
                                      #! Under --vo=gpu-next, this will not take effect. It will use the contrast data marked in the ICC file by default, defaulting to 1000 if missing.
#icc-3dlut-size=64x64x64              # <default auto|RxGxB> Size of the 3D LUT generated from the ICC profile for each dimension. Range<2--512>
#icc-cache=no                         # Whether to store the 3dlut cache of the ICC profile locally, enabled by default
#icc-cache-dir="~~/cache/icc_cache"   # Specify the directory to store and load 3D LUTs created from ICC profiles. This can be used to speed up loading. Note that these files contain uncompressed LUTs. Their size depends on --icc-3dlut-size and can be very large. Note: This does not clean up automatically, so old, unused cache files may stay indefinitely
                                      ## Caching the generated 3dlut is supposed to accelerate, but insufficient hard disk IO performance may have the opposite effect. Decide whether to disable it based on the actual situation
#use-embedded-icc-profile=no          # Load embedded ICC profiles contained in media files (such as PNG images). (Default: yes). Note that this option under --vo=gpu is only effective when also using a display ICC profile (--icc-profile or --icc-profile-auto)

##⇘⇘The following are settings related to target color management
#target-prim=auto                     # For wide color gamut screens, you should set this parameter to a specific value to solve color oversaturation. When not using ICC color management, video colors will adapt to this color space. For sRGB screens, there is no need to change this default value (bt.709). Other examples: for 99% argb screens, write adobe; for 90%+ p3 color gamut screens, write dci-p3 or display-p3
                                      # Using the --target-prim=<value> parameter to manage color space may cause color shifting under HDR. Enabling the --gamut-mapping-mode=clip parameter during HDR mapping can solve this issue.  https://github.com/mpv-player/mpv/issues/9071
                                      #! Note: After Win11 24H2, if the system's HDR or ACM (Automatic Color Management) function is enabled, do not change this item, otherwise color gamut re-compression will cause color undersaturation.
#target-gamut=dci-p3                  # [Effective when --vo=gpu-next], explicitly limit the monitor's color gamut. You can use this option to limit the output color gamut, e.g., DCIP3-in-BT.2020; set `--target-prim` to the color space specification, and set `--target-gamut` to the output color gamut to be limited. Depends on `--target-prim`
                                      ## Newer versions of mpv support custom CIE xy primaries. Chromaticity format: `Rx,Ry,Gx,Gy,Bx,By,Wx,Wy` (red primary, green primary, blue primary, white point). All values must be in the range 0.0-1.0
                                      #! Note: After Win11 24H2, if the system's HDR or ACM (Automatic Color Management) function is enabled, do not change this item, otherwise color gamut re-compression will cause color undersaturation.
#target-trc=gamma2.2                  # Specify the display's transfer characteristic (gamma), effective when ICC color management is not used. Default value auto: under --vo=gpu, use gamma2.2 for HDR, do nothing for SDR; under --vo=gpu-next, always use the bt.1886 curve (assuming infinite contrast, i.e., OLED)
                                      ## It is recommended to always use the gamma2.2 curve for non-OLED and non-HDR displays to avoid overly dark mpv images. For HDR passthrough, this needs to use the auto or pq value
                                      ## For wide color gamut displays and HDR, scrgb (extended linear light transfer) can also be used. Note that if the system does not correctly report display information, it will be equivalent to bt.709. Only available under --vo=gpu-next
#target-contrast=auto                 # <auto|10-1000000|inf> Specify the measured contrast of the output display. This is used in conjunction with --target-peak to calculate the display black point for black point compensation during HDR tone mapping
                                      # The default value is auto, assuming 1000:1 contrast (considered a typical SDR display). When passing through HDR, it will have infinite contrast. The inf contrast specifies a display capable of perfect black levels, i.e., an OLED display
#target-peak=auto                     # <auto|nits> Specify the measured peak brightness of the output display. Affected by the --target-trc parameter. Default value auto: uses appropriate values based on the trc parameter. Defaults to 203 for SDR. For HDR, it is recommended to specify a specific nits value based on actual display performance
                                      # When using ICC color management, if nits is set higher than the default value (203), the monitor will be treated as an HDR screen by mpv
                                      #! Note: If the system's HDR display mode is enabled, this must be set to 203 for SDR content, otherwise the image will be severely dark. For HDR content, use auto or the peak luminance value.
#sdr-adjust-gamma=yes                 # <default auto|yes|no> [Effective when --vo=gpu-next]. Controls whether SDR content should have its gamma adjusted. It only applies to sRGB output target configurations because this is the most common and ambiguous case
                                      ## no: content tagged with sRGB, gamma2.2, or bt.1886 transfer characteristics will be rendered as is; yes: will convert based on available metadata; auto: behaves like no, unless --target-trc is explicitly set, in which case it behaves like yes
                                      ## If you can ensure that both source and target metadata are correct, it is generally recommended to enable this option for more accurate display results
                                      ## Additionally, bt.1886 requires known display contrast to render correctly
#treat-srgb-as-power22=no             # <no|input|output|both|default auto> [Effective when --vo=gpu-next]. When enabled, use the gamma2.2 curve instead of the standard sRGB transfer function
                                      ## no: no special handling; input: treat sRGB as gamma 2.2 when converting input to target color space; output: treat sRGB as gamma 2.2 when converting colors to output color space;
                                      ## both: apply both input and output modes; auto: similar to both, possibly adjusted for the platform to ensure appearance stability. Depending on the platform, the sRGB EOTF used by the system compositor may vary
##⇘⇘The following are parameters related to 3dlut
#lut=<file>                           # [Effective when --vo=gpu-next], specify a custom LUT (Adobe .cube format) to be applied to colors as part of color conversion. The exact method depends on --lut-type
#lut-type=conversion                  # [Effective when --lut=<file> is enabled], <default auto|native|normalized|conversion>, controls how color values passed to and from the LUT specified as --lut are handled
                                      # auto: automatically select the LUT from tagged metadata, otherwise fall back to system (default); native: apply to the original image content in its native RGB color space before conversion to the output color space (non-linear light);
                                      # normalized: apply to normalized RGB image content under linear light before conversion to the output color space;
                                      # conversion: completely replace the conversion from image color space to output color space. If such a LUT exists, it has the highest priority and overrides any ICC profiles and options related to tone mapping and output chroma (--target-prim, --target-trc, etc.)
#target-lut=<file>                    # [Effective when --vo=gpu-next], specify a custom LUT file (Adobe .cube format) to be applied to colors before being displayed on the screen
                                      # After encoding to the target color space, this LUT provides values in normalized RGB form, so it will be processed after the --target-trc parameter
#image-lut=<file>                     # [Effective when --vo=gpu-next], specify a custom LUT file (Adobe .cube format) to be applied to colors during image decoding. The exact method of the LUT depends on --image-lut-type
#image-lut-type=conversion            # [Effective when --image-lut=<file> is enabled], <default auto|native|normalized|conversion>, controls how color values passed to and from the LUT specified as --image-lut are handled
                                      # auto: automatically select the LUT from tagged metadata, otherwise fall back to system (default); native: apply to the original image content in its native color space before decoding to RGB. For example, for HDR10 images, this will input PQ-encoded YCbCr values in the range 0.0-1.0;
                                      # normalized: apply to normalized RGB image content after decoding from its native color encoding, but before linearization;
                                      # conversion: completely replace the color decoding. This type of LUT should ingest the image's native color space and output normalized non-linear RGB
##⇘⇘The following are parameters related to hdr
#inverse-tone-mapping=yes             # <yes|default no> [Effective when --vo=gpu-next], if set, allows inverse tone mapping (expanding SDR to HDR), only effective on HDR devices. Not supported with some tone mapping curves, use with caution
#target-colorspace-hint=no            # <default auto|yes|no> [Effective when --vo=gpu-next], automatically configure the display's output color space if possible to match the input values of the media stream (this can be used for HDR passthrough or setting the output color space for SDR content). Requires driver support
                                      ## auto: the target color space will only be set if the current display parameters are known. Currently, Wayland, D3D11, and winvk all support this; yes: always set the target color space; no: do not use target color space transfer
                                      ## Windows requires manually switching the display's HDR mode (a limitation of Windows) to achieve HDR passthrough
#target-colorspace-hint-mode=target   # <default target|source|source-dynamic> [Effective when --vo=gpu-next], specify how to handle target color space transfer
                                      ## target: use metadata based on the actual capabilities of the target display. When target metadata is not present, it will attempt to fall back to using source. This is the more reliable mode
                                      ## source: use the metadata of the source content. This is the traditional HDR passthrough mode, assuming the compositor and display will directly handle the color space and perform any necessary mapping. Not recommended
                                      ## source-dynamic: same as 'source', but uses dynamic per-scene metadata instead of static HDR10. This is experimental and depends on the display's ability to react to metadata changes. Note that this does not send full HDR10+ or Dolby Vision metadata, but uses them to generate HDR10 dynamic per-scene metadata
#target-colorspace-hint-strict=no     # <no|default yes> [Effective when --vo=gpu-next], when enabled (default), respects the configured swapchain color gamut (including hint). In this mode, `--target-*` options act only as hints, while the swapchain format is negotiated for rendering output. When disabled, the swapchain color gamut will be overridden to match the `--target-*` options
#tone-mapping=hable                   # Tone-mapping algorithm. Other recommended usable ones: clip|mobius|reinhard|hable|bt.2390|gamma|spline|bt.2446a|st2094-10|st2094-40, default auto selects the best curve based on internal heuristics (under --vo=gpu-next, it's actually spline)
                                      # spline, bt.2446a, st2094-10, and st2094-40 algorithms are only available under --vo=gpu-next
                                      ## For vo=gpu, it is recommended to test hable or bt.2390. hable retains details relatively better, while bt.2390 has better contrast
                                      ## For vo=gpu-next, it is currently recommended to test spline, hable, and bt.2446a. The spline mapping algorithm, when used with --hdr-compute-peak, currently has the best tone-mapping performance within mpv
#tone-mapping-param=0.3               # Small parameter for the tone-mapping algorithm. hable and bt.2446a have no parameters; bt.2390 has no parameters under --vo=gpu, but under -vo=gpu-next the default is 1.0; st2094-10 defaults to 0.7/mobius and spline default to 0.5/reinhard default to 0.5/gamma default to 1.8 (under --vo=gpu-next, the default is 0.3)
                                      # When using bt.2390 under -vo=gpu-next, recommended values: 2.0 or the value 0.5 from the ITU-R specification
#tone-mapping-max-boost=1.0           # <1.0-10.0> Maximum exposure multiplier for average brightness, default: 1.0. Increasing this value can reveal hidden details in dark areas, but too high will make dark areas look unnaturally bright. You can try values like 1.0,1.33. Only available under --vo=gpu
#gamut-mapping-mode=clip              # <default auto|clip|perceptual|relative|saturation|absolute|linear|warn|desaturate|darken> Specifies how to handle the desired target display color gamut after any tone mapping has been completed. Default auto: automatically select the best mode (actually applies perceptual)
                                      # clip: hard clip per RGB channel to target color gamut, recommended to use first; perceptual: perform perceptually balanced gamut mapping using a soft knee, with a roll-off clipping region, and hue conversion functions, preserving saturation
                                      # relative: perform relative colorimetric clipping while maintaining the exponential relationship between luminance and chroma; saturation: perform simple RGB->RGB saturation mapping. Never clips, but distorts all hues and/or leads to a faded appearance
                                      # absolute: perform absolute colorimetric clipping. Like 'relative', but does adapt to the white point; linear: reduce image saturation linearly/uniformly to bring the entire image into the target gamut
                                      # warn: just highlight out-of-gamut pixels; desaturate: perform constant luminance colorimetric clipping, reducing color saturation towards white until they are in range; darken: uniformly darken the input slightly to prevent clipping and highlight blow-outs, then colorimetrically clamp to the input gamut boundaries, slightly biased to preserve the luminance of the color
#hdr-reference-white=100              # <auto|10-1000000> [Effective when --vo=gpu-next] Specifies the luminance of the diffuse reference white for SDR content in HDR, in cd/m² (nits). Essentially, this is the SDR luminance within the HDR container. The default is 203 cd/m²
                                      ## When the target transfer function for output is SDR, this option will override the value of the --target-peak option (if set). This means SDR output can be controlled separately from HDR output
#hdr-contrast-recovery=0.30           # <0.0-2.0> Enable the HDR contrast recovery algorithm, which aims to enhance the contrast of HDR videos after tone mapping. Only applies to --vo=gpu-next
                                      # The strength (default: 0.0) indicates the degree of contrast recovery, 0.0 means fully disabled, 1.0 means 100% strength. Values greater than 1.0 are allowed but may cause over-sharpening
                                      ## The default value of this parameter in mpv's built-in configuration group gpu-hq is 0.30
#hdr-contrast-smoothness=3.5          # <1.0-100.0> Enable the HDR contrast smoothing algorithm, which aims to enhance the smoothness of HDR videos after tone mapping. Only applies to --vo=gpu-next
                                      # The smoothness (default: 3.5) indicates the degree to which the HDR source is low-pass filtered to obtain contrast information. A value of 2.0 corresponds to a 2x downscale. Users with low DPI monitors (<= 100) may wish to lower this value, while those with very high DPI monitors ("retina") may wish to increase it
#hdr-compute-peak=yes                 # <default auto|yes|no> This option essentially provides dynamic scene-based tone mapping. (Older graphics cards do not support this parameter, and the image will become overly bright.) It may cause luminance flickering as it changes with scene changes
                                      # Currently, when --hdr-compute-peak is enabled, some tone-mapping curves (bt.2390,reinhard) are prone to losing highlight details or overexposure; while some other tone-mapping curves show significant improvement (spline,bt.2446a,hable)
#hdr-peak-decay-rate=20               # [Effective when --hdr-compute-peak=yes], decay rate for the HDR peak detection algorithm (<0.0-1000.0> default: 20.0)
#hdr-scene-threshold-low=1.0          # [Effective when --hdr-compute-peak=yes], the lower threshold (dB) of luminance difference that will be considered a scene change (<0.0-100.0> default: 1.0)
#hdr-scene-threshold-high=3.0         # [Effective when --hdr-compute-peak=yes], the upper threshold (dB) of luminance difference that will be considered a scene change (<0.0-100.0> default: 3.0)
#hdr-peak-percentile=100              # Effective when [--hdr-compute-peak=yes] and [-vo=gpu-next]. (<0.0-100.0> default: 100.0) Specifies which percentile of the input image's luminance histogram to consider as the true peak
                                      # If set to 100 (default), it measures the brightest pixel. Otherwise, the top portion of the frequency distribution is progressively cut off. Setting it too low will clip very bright details but can improve the dynamic range of scenes with very bright isolated highlights. Values other than 100 come with a small performance penalty
                                      ## If you find the image brightness always jumping, you can reduce this parameter to ignore some peaks. It is not recommended to go below 99.7
                                      ## The default value of this parameter in mpv's built-in configuration group gpu-hq is 99.995
#allow-delayed-peak-detect=no         # Effective when [--hdr-compute-peak=yes] and [-vo=gpu-next], default no. When using --hdr-compute-peak, allows delaying the detected peak by one frame if it benefits performance
                                      # Especially when advanced rendering is not needed, this can avoid unnecessary FBO processing. Note that -vo=gpu defers peak processing by default

##⇘⇘The following are parameter settings for adjusting the picture effect
#video-sync=display-resample          # Similar to "ReClock" effect, changes to synchronize video frames with the display refresh rate, automatically adjusting audio speed to compensate for offset. # Recommended to disable for SVP interpolation
                                      # The default value audio (synchronized with audio/system clock) generally has the best compatibility but has occasional frame drops and duplicates
#video-sync-max-video-change=5        # [Only effective when --video-sync=display-xxxx] Default value: 1
#interpolation                        # [Only effective when --video-sync=display-xxxx] Reduce stuttering (also known as judder) caused by mismatches between video fps and display refresh rate. # Recommended to disable for SVP interpolation
                                      # Algorithm used for interpolation. For details, see https://mpv.io/manual/master/#options-tscale
                                      # Some discussions at https://github.com/mpv-player/mpv/issues/2685
#interpolation-preserve=no            # [Effective when --vo=gpu-next], default yes. Preserve the interpolation result of the previous frame even when renderer parameters are changed. Options related to cropping and video placement are exceptions; they always invalidate the cache
                                      # Enabling this option makes dynamic updates of renderer settings smoother, at the cost of slightly higher latency when responding to such changes
#tscale=oversample                    # [Only effective when --interpolation is enabled] Select the temporal interpolation algorithm (non-MEMC motion compensation). # Recommended to disable for SVP interpolation
                                      # The default interpolation algorithm is oversample. Overall, mitchell is smoother (though not comparable to SVP interpolation) but introduces blur. oversample has no blur but is not smooth (basically reproduces 24 frames, similar to MADVR's smoothmotion), triangle falls in between, and catmull_rom is relatively sharp
                                      # Which one to choose depends on your needs
#tscale-radius=1.0                    # Set the radius of the tunable filter, must be a floating point number between 0.5 and 16.0. If not specified, defaults to the filter's preferred radius. Not applicable for every scaler and VO combination
#tscale-clamp=0.0                     # <0.0-1.0> Specifies the weight bias to multiply by negative coefficients. Specifying --scale-clamp=1 has the effect of completely removing negative weights, effectively limiting the value range to [0-1]. A value between 0.0 and 1.0 can be specified to apply only a modest reduction of negative weights
                                      # The default value for tscale is 1.0, which effectively reduces ringing artifacts produced by tscale. The default for other scale algorithms is 0.0
#tscale-antiring=1.0                  # Set the anti-ringing strength. This attempts to eliminate ringing but may introduce other artifacts in the process. Must be a floating point number between 0.0 and 1.0. The default value 0.0 completely disables anti-ringing
                                      # Note that this does not affect the special filters bilinear and bicubic_fast
#dither-depth=auto                    # <N|no|default auto> Whether to enable color depth dithering to compensate for color conversion loss. Write 8 for 8-bit monitors, 10 for 10-bit monitors. The auto value depends on --gpu-api and may not be correct
                                      # If using 8-bit dithering on a 10-bit monitor causes output issues, change the value back to 8
#dither=fruit                         # <default fruit|ordered|error-diffusion|no>  [Effective when --dither-depth is enabled], select the color depth dithering algorithm
                                      # The error-diffusion algorithm has the best effect but also the highest power consumption. When performance is insufficient, it will automatically fall back to the fruit algorithm
#dither-size-fruit=6                  # [Effective when --dither=fruit], <2-8> Set the size of the color depth dithering matrix (default: 6). The actual size of the matrix is (2^N)x(2^N), with option value N, so 6 actually means 64x64
#error-diffusion=sierra-lite          # <simple|default sierra-lite|floyd-steinberg|atkinson> [Effective when --dither=error-diffusion], the algorithm kernel used for error-diffusion
#temporal-dither                      # [Effective when --dither-depth is enabled], enable temporal color depth dithering algorithm (i.e., inter-frame mixed color depth dithering algorithm)
                                      # This works by varying the orientation of the tiled dithering matrix across 8 different dithering patterns each frame. This has the potential to cause flickering on LCD displays
#temporal-dither-period=1             # <1-128> [Effective when --temporal-dither is enabled], determines how often the color depth dithering pattern updates when in use. 1 (the default) will update every video frame

#scale=ewa_hanning                    # Upscaling algorithm. The default algorithm is lanczos. Recommended algorithms are --ewa_lanczos, --ewa_lanczossharp, and --ewa_hanning, i.e., the jinc algorithm and its variants
                                      # ewa_hanning reduces ringing compared to other jinc algorithms
                                      # Among the built-in scale algorithms, the spline36 algorithm is more suitable for live-action images, while ewa-type algorithms are more suitable for anime-style images
#scale-radius=3.2383154841662362      # Set the radius of the tunable filter, must be a floating point number between 0.5 and 16.0. If not specified, defaults to the filter's preferred radius. Not applicable for every scaler and VO combination
#scale-antiring=1.0                   # Set the anti-ringing strength. This attempts to eliminate ringing but may introduce other artifacts in the process. Must be a floating point number between 0.0 and 1.0. The default value 0.0 completely disables anti-ringing
                                      # Note that this does not affect the special filters bilinear and bicubic_fast
                                      ## Basically, there is no need to enable this when using external upscale shaders
#cscale=bilinear                      # Chroma upscaling algorithm. If not specified, --scale is automatically used (not recommended). It is recommended to use the bilinear algorithm, as the perceptual difference of chroma upscaling algorithms is not obvious and generally does not require much performance
                                      # In practical tests, the bilinear algorithm is more suitable for poorer quality sources, while the catmull_rom algorithm is more suitable for better quality sources
                                      # Although "KrigBilateral.glsl" has the best effect, it may cause high power consumption with special sources (VFR) and special shader combinations
#cscale-radius=3                      # Set the radius of the tunable filter, must be a floating point number between 0.5 and 16.0. If not specified, defaults to the filter's preferred radius. Not applicable for every scaler and VO combination
#cscale-antiring=1.0                  # Set the anti-ringing strength. This attempts to eliminate ringing but may introduce other artifacts in the process. Must be a floating point number between 0.0 and 1.0. The default value 0.0 completely disables anti-ringing
                                      # Note that this does not affect the special filters bilinear and bicubic_fast
                                      ## Basically, there is no need to enable this when using external cscale shaders
#dscale=catmull_rom                   # Downscaling algorithm. The default algorithm is hermite
                                      # When using only built-in dscale algorithms, bicubic (with catmull_rom recommended as a variant) or ewa_hanning is recommended. You can also test robidouxsharp, ewa_robidouxsharp, and other algorithms
#dscale-radius=1                      # Set the radius of the tunable filter, must be a floating point number between 0.5 and 16.0. If not specified, defaults to the filter's preferred radius. Not applicable for every scaler and VO combination
#dscale-antiring=1.0                   # Set the anti-ringing strength. This attempts to eliminate ringing but may introduce other artifacts in the process. Must be a floating point number between 0.0 and 1.0. The default value 0.0 completely disables anti-ringing
                                      # Note that this does not affect the special filters bilinear and bicubic_fast
                                      ## Basically, there is no need to enable this when using external dcale shaders
#linear-upscaling=no                  # [Requires --fbo-format to specify 16-bit or higher precision; incompatible with --sigmoid-upscaling] (No effect on HDR content)
#sigmoid-upscaling=no                 # [Incompatible with --linear-upscaling] Non-linear color conversion during upscaling can avoid strong ringing artifacts. Enabled by default
                                      ## Developers recommend either prioritizing --sigmoid-upscaling or simply not using either of the above (i.e., scaling in gamma light)
                                      ## Basically, there is no need to enable this when using external upscale shaders
#correct-downscaling=yes              # [Ineffective when --dscale=bilinear] Enhance the quality of the downscaling algorithm (anti-aliasing). May cause minimal distortion for non-standard aspect ratio videos. Enabled by default
                                      ## Can be replaced by the better "SSimDownscaler.glsl" shader solution
#linear-downscaling=no                # [Must be disabled when using "SSimDownscaler.glsl"; requires --fbo-format to specify 16-bit or higher precision] (No effect on HDR content). Enabled by default
                                      ## The above two --linear- parameters correspond to "scale in linear light" in MADVR. Linear processing during downscaling can improve the accuracy of color contrast and suppress ringing artifacts generated by some algorithms
#scaler-resizes-only=no               # Default yes. When no scaling is performed, use the bilinear algorithm for perfect restoration. When disabled, even if the size is unchanged, the specified scale value is used for processing, which can correct the half-pixel offset introduced by nnedi3 and ravu (but it's not necessary)
#deband=no                            # Remove color banding. Does not need to be always on; can be manually enabled depending on the source
#deband-iterations=1                  # <0-16> Number of debanding passes. Higher strength but also more time-consuming. Values >4 are practically ineffective (default 1). 3-4 is equivalent to setting deband to high in madvr
#deband-threshold=48                  # <0-4096> Cutoff threshold for the filter. Higher numbers increase strength but gradually reduce image detail (default 48)
#deband-range=16                      # <1-64> Initial radius. Larger values result in stronger debanding and higher performance usage; smaller values make it smoother (default 16). If you increase --deband-iterations, you need to decrease this value to compensate
#deband-grain=32                      # <0-4096> Add extra dynamic noise to help mask remaining quantization artifacts (default 32)

########
# Audio #
########

audio-device=auto                     # Used to specify the audio output device at startup
                                      # Example of changing to a specific value --audio-device="wasapi/{xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}". See the official manual for how to get the device name
audio-channels=7.1,5.1,stereo         # <default value auto-safe|auto|layouts|stereo>. If some channels are missing when playing multi-channel movies on a two-channel system, try forcing it to two-channel
                                      # Note: This must be set to the relevant channel values or priority order of the actual audio output device. Under mpv's default auto-safe and auto, there is an issue of channel loss during multi-channel downmixing, so it is not recommended
                                      # The example parameter 7.1,5.1,stereo is a priority order for common audio output devices. It will automatically fall back to select an output value that matches the actual audio output device (most use stereo two-channel devices)
                                      # When downmixing multi-channel audio to two channels, if you find the background music too loud and character dialogue too soft, try looking here: https://github.com/mpv-player/mpv/issues/6563 
ao=wasapi                             # --ao=<driver1,driver2,...[,]> Specify a priority list of audio output drivers to use. If the list has a trailing ',', mpv will fall back to drivers not included in the list
                                      ## wasapi is recommended for Windows; alsa is recommended for Linux, needs to be used with the parameter --audio-channels=auto; coreaudio or coreaudio_exclusive is recommended for macOS
                                      ## Tests show that if other software exclusively occupies the audio channel and then MPV is opened, the video will become extremely choppy
#audio-exclusive=yes                  # Audio channel exclusive. If there are audio stuttering issues, you can disable this or the above item
#volume=100                           # Player startup volume. 0 is mute, default 100
#volume-max=130                       # <100.0-1000.0> Maximum volume. Default 130 (the loudness of 130 is approximately twice that of 100, 1.3^3≈2)
#audio-pitch-correction=no            # [Prerequisite for --af=scaletempo/scaletempo2/rubberband] Pitch correction during variable speed playback, default yes. Automatically inserts one of the first three audio filters (see the filter section for more information)
#audio-delay=0.04                     # If needed, set the audio delay
#audio-samplerate=96000               # Force resampling to 96kHz, 24bit (requires audio device hardware support). Note! Not necessary
#audio-format=s32
#audio-normalize-downmix=yes          # Enable/disable normalization when downmixing surround audio to stereo (default: no). If disabled, downmixing may cause clipping. If enabled, the output may be too quiet. This depends on the source audio
#replaygain=track                     # <default no|track|album> Adjust volume gain based on replaygain values stored in file metadata
                                      # no: do not perform any adjustment; track: apply track gain; album: apply album gain if available, otherwise fall back to track gain
#ad-lavc-downmix=yes                  # <yes|default no> Whether to request audio channel downmixing from the decoder. Some decoders (e.g., AC-3, AAC, and DTS) can remix audio during decoding
gapless-audio=no                      # <no|yes|weak default> Attempt to play consecutive audio files gaplessly without muting or interruption. Default weak: initialize audio output when audio format changes
                                      # Setting to yes may cause files to save the same sample rate, leading to reduced audio quality
#audio-file-auto-exts=aac,ac3,dts,eac3,flac,m4a,mka,mp3,ogg,opus,thd,wav,wv
                                      # Specify the extensions of audio files to try matching when using the "audio-file-auto" option. The example is the default value
audio-file-auto=fuzzy                 # <default no|exact|fuzzy|all> Specify how to automatically load external audio tracks
                                      ## no: disable; exact: automatically load external audio tracks with extensions conforming to BCP 47 language tag syntax; fuzzy: automatically load external audio tracks containing the video filename; all: automatically load all detected audio tracks
audio-file-paths=audio;audios;audio 5.1;audios 5.1;audio 7.1;audios 7.1;audio tracks
                                      # <path1:path2:...> Search for matching audio tracks in specified additional directories, supporting relative and absolute paths
                                      ## ":" is replaced with ";" on Windows
alang=japanese,jpn,jap,ja,jp,english,eng,en
                                      # Set the preferred language for audio tracks, but MPV prioritizes loading external tracks
#aid=1                                # Currently unable to select tracks based on other metadata; mpv defaults to preferring external tracks, often selecting unwanted audio tracks
                                      ## It is recommended to use the trackselect.lua script to automatically select specified audio tracks based on metadata. https://github.com/po5/trackselect

########
# Subtitles #
########

#sub-font-provider=fontconfig                 # <default auto|none|fontconfig> Font rendering API options. For Windows, auto is recommended as DirectWrite has the best performance
                                              # auto automatically selects the system font rendering interface: DirectWrite for Windows, fontconfig for Linux, CoreText for macOS
                                              # none ignores the subtitle-specified font and uses the sub-font parameter; subtitle style remains unchanged (ineffective for embedded subtitles)
                                              # fontconfig uses the font loading items in the fonts.conf file in the mpv.conf directory, allowing customization of the fonts path with <dir>CUSTOMFONTDIR</dir>
                                              # When using fontconfig on Windows, all fonts in the directory are loaded into memory on first use, then loaded on demand afterwards. Loading and switching are extremely slow, not recommended
#sub-ass-override=no                          # <yes|no|default scale|force|strip> Set subtitle rendering mode, controlling whether to apply style overrides
                                              ## no: disable; yes: apply all --sub-ass-* style override options; force: forcibly apply all --sub-* options; scale: similar to yes, but also applies --sub-scale; strip: remove all ASS tags and styles, also affects PGS, SRT, and other format subtitles

#sub-scale-by-window=no                       # Whether to scale subtitles according to the window size (default: yes). Affects both plain text and ASS format subtitles
#sub-scale-with-window=no                     # Make subtitle font size relative to the window, not the video (default: yes). Only affects plain text subtitles
#sub-ass-scale-with-window=yes                # Similar to --sub-scale-with-window, but only affects ASS format subtitles (default: no). In some cases, this may cause ASS style misalignment
#embeddedfonts=no                             # Use fonts embedded in Matroska container files and ASS scripts (default: yes)
sub-codepage=gb18030                          # Specify the code page to use when decoding text subtitles. The default value auto: automatically detect subtitle encoding, first trying UTF-8 encoding, then falling back to using uchardet to guess the subtitle encoding (mpv needs to be built with uchardet)
                                              ## The example shows first trying GB18030 encoding when the subtitle encoding is detected as non-UTF-8 (suitable for Chinese subtitle users)
                                              ## Note: This only applies to text subtitle files. Other types of subtitles (especially subtitles in mkv files) are always assumed to be UTF-8
#sub-auto-exts=ass,idx,lrc,mks,pgs,rt,sbv,scc,smi,srt,ssa,sub,sup,utf,utf-8,utf8,vtt
                                              # Specify the extensions of subtitle files to try matching when using the "sub-auto" option. The example is the default value
sub-auto=fuzzy                                # <no|default exact|fuzzy|all> Specify how to automatically load external subtitles
                                              ## no: disable; exact: automatically load external subtitles with extensions conforming to BCP 47 language tag syntax; fuzzy: automatically load external subtitles containing the video filename; all: automatically load all detected subtitles
sub-file-paths=sub;subs;subtitles;subtitles
                                              # <path1:path2:...> Search for matching subtitles in specified additional directories. Supports relative and absolute paths. The example automatically searches for folders named "sub","subs","subtitles" in the current file's path
                                              ## ":" is replaced with ";" on Windows
slang=chs,sc,zh-Hans,zh-CN,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh
                                              ## Set the preferred language for subtitles, but MPV prioritizes loading external tracks
#sid=1                                        ## Currently unable to select tracks based on other metadata; mpv defaults to preferring external tracks, often selecting unwanted subtitles
                                              ## It is recommended to use the sub-select.lua script to automatically select specified subtitles based on metadata. https://github.com/CogentRedTester/mpv-sub-select
#subs-fallback=default                        # <yes|default default|no> If no existing subtitle track satisfies the --slang condition, fall back to selecting another subtitle track. The value default means only select tracks marked as "default"
#subs-fallback-forced=no                      # <default yes|always|no> When automatically selecting a subtitle track, if no track matches your preferred language, select a forced track that matches the language of the selected audio track
#subs-with-matching-audio=yes                 # <default yes|forced|no> When automatically selecting a subtitle track, even if the selected audio track matches your preferred subtitle language, select a complete/non-forced subtitle track
#subs-match-os-language=yes                   # <default yes|no> When automatically selecting a subtitle track, select a track that matches the operating system language (if the audio stream uses another language). Note that if "--slang" is set, this is completely ignored

#blend-subtitles=yes                          # <yes|video|default no> Blend subtitles onto the video frame before interpolation and color management. The value video is similar to yes, but draws subtitles at the video's original resolution and scales them with the video
                                              # Enabling this restricts subtitles to the visible portion of the video (they cannot appear in the black bars below the video)
                                              # It also makes subtitles subject to the effects of --icc-profile, --target-prim, --target-trc, --interpolation, --gamma-factor, and --glsl-shaders, etc.
                                              # When using --interpolation, with an appropriate tscale algorithm, it can improve subtitle performance
                                              ## Issue status under HDR: https://github.com/mpv-player/mpv/issues/6368 (static mapping is unaffected)
#sub-ass-force-margins=yes                    # [Ineffective when --blend-subtitles=yes/video] The default is no. When set to yes, ASS subtitles will be output in the black bars as much as possible
                                              ## It is not recommended to always set this to yes, as it can break the positioning effects of some ASS subtitles. It is recommended to toggle it manually via shortcut keys
#stretch-image-subs-to-screen=yes             # Force stretching of image subtitles to the scaled resolution instead of the reference video resolution, allowing PGS subtitles to be output in the black bars. Note: This may break the display effect
                                              ## Note: When the video aspect ratio and the PGS subtitle aspect ratio differ, enabling this is the only way to get correct subtitle display (most internally-embedded PGS subtitles in domestic movie rips have this issue)
#sub-hdr-peak=sdr                             # <default sdr|10-10000> Control the brightness of text subtitles and OSD in HDR output. The special value sdr corresponds to the SDR reference white (203 nit)
                                              ## Note: This option also affects the brightness of text subtitles when HDR maps to SDR with --blend-subtitles=<yes|video> enabled
#image-subs-hdr-peak=sdr                      # <default sdr|video|10-10000> Control the brightness of image subtitles in HDR output. The special value sdr corresponds to the SDR reference white (203 nit), and the special value video uses the video metadata
                                              ## Note: This option also affects the brightness of image subtitles when HDR maps to SDR with --blend-subtitles=<yes|video> enabled

##⇘⇘Subtitles look different from xy-subfilter? Try enabling the settings below
#sub-ass-vsfilter-color-compat=full           # <default basic|full|force-601|no> Mimic (xy-)vsfilter behavior for subtitle color space conversion
#sub-ass-use-video-data=none                  # <none|aspect-ratio|default all> Control which information about the video stream is passed to libass. Any option other than 'all' is incompatible with standard ASS and VSFilter
                                              ## For some types of damaged ASS files, you may need to try setting 'aspect-ratio' to get normal rendering; when a damaged ASS file on an anamorphic video appears stretched, try setting 'none' to fix it. This parameter does not affect non-anamorphic videos
#sub-ass-video-aspect-override=16:9           # <default no|ratio> Allow passing an arbitrary aspect ratio to libass instead of the video's actual aspect ratio. Zero or negative aspect ratios are equivalent to 'no'
                                              ## This option has no effect when the 'sub-ass-use-video-data' option is set to none
#sub-vsfilter-bidi-compat=yes                 # <yes|default no> When enabled, sets implicit bidirectional detection to "ltr" instead of "auto" to match ass's default behavior. Only enable it if subtitle bidirectional detection is incorrect
                                              ## This only affects plain text (non-ASS) subtitles
#sub-ass-style-overrides-append=Encoding=-1   # Force style: enable auto-detection. Can be used to fix character encoding and text direction recognition errors, and improve rendering of some ASS tags
#sub-ass-style-overrides-append=ScaledBorderAndShadow=no
                                              # Force style: do not scale borders and shadows. Can prevent the so-called "heavy ink" style. https://github.com/libass/libass/issues/287
                                              # Note: This issue has been fixed in libass versions after 0.15.2

#sub-gauss=1.5                                # <0.0-3.0> Apply Gaussian blur to image subtitles (default: 0). This can help pixelated DVD/Vobsubs look better
#sub-gray=yes                                 # Convert image subtitles to grayscale. Can help make yellow DVD/Vobsubs look better
#sub-fix-timing=yes                           # Adjust subtitle timing to remove small gaps or overlaps between subtitles (removing gaps or overlaps if the difference is less than the set value). This might make things worse in some cases, in which case you can try disabling it. Disabled by default
#sub-fix-timing-threshold=210                 # Specify the threshold for --sub-fix-timing in milliseconds (default: 210)
#sub-fix-timing-keep=400                      # Specify the minimum duration in milliseconds to trigger a --sub-fix-timing subtitle event (default: 400)
#sub-stretch-durations=yes                    # Extend the duration of subtitles so that they end when the next subtitle starts. Can be helpful for subtitles that erroneously have zero duration, but can also break normal subtitles. Disabled by default
#sub-fps                                      # Specify the frame rate of the subtitle file (default: video fps). Only affects text subtitles
#sub-speed=24/23.976                          # Multiply subtitle event timestamps by a given value. Can be used to fix playback speed for frame-based subtitle formats. Only affects text subtitles
                                              # --sub-speed=24/23.976 plays frame-based subtitles assuming a frame rate of 23.976, with 24 frames per second
#stretch-dvd-subs=yes                         # Stretch DVD subtitles when playing anamorphic video. Disabled by default
#sub-filter-regex-plain=yes                   # Whether to first convert the ASS "Text" field to plain text (default: no). This strips ASS tags and applies ASS directives (like \N) to newlines. If the result is multi-line, the regular expression anchors ^ and $ match each line, but any matches still discard all lines
#sub-filter-regex-warn=yes                    # Log discarded lines with warning log level instead of verbose (default: no). Useful for testing
#sub-filter-regex-enable=no                   # Whether to enable regular expression filtering (default: yes). Has no effect when the following two parameters are empty
#sub-filter-regex-append=opensubtitles\.org   # --sub-filter-regex-...=... Set a list of regular expressions to match against text subtitles and remove any matching lines (default: empty). Matching is case-insensitive, but how this is done depends on libc and is likely only applicable to ASCII. It does not apply to bitmap/image subtitles
#sub-filter-jsre-append=                      # Same as --sub-filter-regex, but uses JavaScript regular expressions. Shared/affected by all --sub-filter-regex-* control options, requires JavaScript support

##⇘⇘Subtitle settings when no built-in style is available
#sub-fonts-dir=~~/fonts                       # Specify the font lookup directory for text subtitles. The example is the default value
sub-font="Noto Sans CJK SC"                   # Specify the font for plain text subtitles. This parameter should theoretically have no effect on ASS subtitles, but it actually affects the default fallback font for ASS. https://github.com/mpv-player/mpv/issues/8637
sub-font-size=50                              # Text subtitle font size
sub-bold=yes                                  # Use bold style for text subtitles
#sub-italic=yes                               # Use italic style for text subtitles
sub-color="#FFFFFF"                           # Text subtitle font color. <format (AA)RRGGBB> AA is hexadecimal transparency, RRGGBB is hexadecimal color representation
sub-outline-size=0.5                          # Text subtitle outline size
sub-outline-color="#000000"                   # Text subtitle outline color
sub-shadow-offset=0.5                         # Text subtitle shadow size
sub-back-color="#000000"                      # Text subtitle shadow/background color
#sub-border-style=opaque-box                  # <default outline-and-shadow|opaque-box|background-box> Style for text subtitle borders
                                              # outline-and-shadow: draw outline and shadow; opaque-box: draw outline and shadow; draw outline and shadow as an opaque box tightly wrapping each line of text; background-box: draw a background box framing all lines of text
#sub-spacing=1                                # Text subtitle character spacing
#sub-blur=0.5                                 # Edge blurriness of text subtitles. Recommended value between 0.5 and 3.0. <0..20.0> 
#sub-use-margins=no                           # Whether to output plain text subtitles in the black bars. Default yes
#sub-pos=100                                  # Specify the vertical position of subtitles on the screen as a percentage of the screen height. Default 100. Values above 100 move subtitles down. Affects ASS and plain text subtitles
#sub-margin-x=25                              # Left and right screen margin for subtitles in scaled pixels. This option specifies the distance of subtitles from the left edge and the distance to the right edge
#sub-margin-y=22                              # Top and bottom screen margin for subtitles in scaled pixels. This option specifies the vertical margin for plain text subtitles. If you only want to raise the vertical subtitle position, use --sub-pos
#sub-align-x=center                           # <left|default center|right> Controls which corner of the screen text subtitles should align with. Never applied to ASS subtitles unless in --no-sub-ass mode. Also, this does not apply to PGS image subtitles
#sub-align-y=bottom                           # <top|center|default bottom> Controls the vertical position of text subtitles
#sub-justify=left                             # <default auto|left|center|right> Controls the alignment of multi-line subtitles (default: auto, aligned according to --sub-align-y). Left alignment is recommended
#sub-ass-justify=yes                          # Apply --sub-justify on ASS subtitles if --sub-ass-override is not set to no. Default: no


