#no-border                            # Default is the system native window interface. Enabling this uses a borderless interface (removes Windows window decorations)
no-title-bar                          # Control whether to use the window title bar for playback, enabled by default. Unlike --no-border, --no-title-bar preserves Windows native window features
input-ime=no                          # <yes|default no> Whether to enable global IME feature, default is to activate IME only during text input
#media-controls=yes                   # <yes|default player|no> Enable integration of the media control interface SMTC (Windows only)
