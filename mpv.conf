# Screenshots #
########

### The following preset parameters are for capturing the highest quality screenshots
screenshot-format=webp                        # <default jpg|(same as previous)jpeg|png|webp|jxl|avif>
#screenshot-png-compression=7                 # <0-9> PNG compression level. Too high a level affects performance. Default is 7
#screenshot-png-filter=5                      # Set the filter to apply before PNG compression. 0: none, 1: sub, 2: up, 3: average, 4: Paeth, 5: mixed. This affects the achievable compression level. For most images, mixed achieves the best compression ratio, so it is the default
#screenshot-jpeg-quality=100                  # <0-100> Highest quality for JPEG. Default is 90
#screenshot-jpeg-source-chroma=no             # Write JPEG with the same chroma subsampling as the source video. Default yes
#screenshot-webp-lossless=yes                 # Lossless WEBP. Default no
screenshot-webp-quality=85                    # <0-100> [Effective when --screenshot-webp-lossless=no] Quality for lossy WEBP. Default 75
screenshot-webp-compression=6                 # <0-6> WEBP compression level. Too high a level affects performance. Default is 4. Note: This also affects image quality when using lossy WEBP
#screenshot-jxl-distance=0                    # <0-15> JXL visual model distance. 0 is quality lossless, 0.1 is visually lossless. Default 1 is equivalent to JPEG quality 90
#screenshot-jxl-effort=5                      # <1-9> JXL compression level. Too high a level affects performance. Default 4
screenshot-tag-colorspace=no                  # Tag screenshots with appropriate color space (not supported by all formats). Default yes
#screenshot-high-bit-depth=no                 # Primarily affects PNG and JPEG XL. Attempt to use the same bit depth as the video output. Default yes. Note: Using the same bit depth will significantly increase the final size of PNG/JXL files
#screenshot-sw=yes                            # Whether to use software rendering for screenshots. Default: no. If set to yes, use a software scaler to convert the video to RGB (or whatever is required for the target screenshot). Software renderers may lack certain features, such as HDR rendering
screenshot-template="~~/files/screen/%{media-title}-%P-%n"
                                              # # [If the path is directly set in the template, --screenshot-dir is not required] Screenshot naming template: https://mpv.io/manual/master/#options-screenshot-template
#screenshot-dir=~~desktop/                    # [If the path is set in the screenshot naming template, this parameter is not required] Default saves screenshots to the desktop

